<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TruSea Fish — MIS Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  font-size: 14px;
  padding-bottom: 60px;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  padding: 18px 20px 14px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.header h1 {
  font-size: 20px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: -0.5px;
}
.header h1 span { color: #90e0ef; }
.header-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
  letter-spacing: 0.3px;
}
.sync-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
}
.sync-info {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}
.sync-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  color: #fff;
  cursor: pointer;
  transition: background 0.2s;
}
.sync-btn:active { opacity: 0.7; }

/* ── DATE BANNER ── */
.date-banner {
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.date-banner .today-lbl { font-size: 12px; color: #888; font-weight: 500; }
.date-banner .today-val { font-size: 13px; font-weight: 700; color: #1a1a2e; }

/* ══════════════════════════════════════
   TOP PROFIT SUMMARY STRIP
══════════════════════════════════════ */
.profit-strip {
  margin: 14px 14px 0;
  background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
  border-radius: 18px;
  padding: 18px 16px;
  box-shadow: 0 4px 20px rgba(26,26,46,0.25);
  position: relative;
  overflow: hidden;
}
.profit-strip::before {
  content: '🐟';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 52px;
  opacity: 0.08;
}
.profit-strip-title {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 12px;
}
.profit-3col {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}
.profit-col {
  text-align: center;
  padding: 0 8px;
  border-right: 1px solid rgba(255,255,255,0.1);
}
.profit-col:last-child { border-right: none; }
.profit-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 4px;
}
.profit-value {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.5px;
  line-height: 1;
}
.profit-value.green  { color: #4ade80; }
.profit-value.red    { color: #f87171; }
.profit-value.white  { color: #ffffff; }
.profit-value.cyan   { color: #90e0ef; }
.profit-sub {
  font-size: 9px;
  color: rgba(255,255,255,0.3);
  margin-top: 3px;
}
.profit-badge {
  display: inline-block;
  margin-top: 6px;
  background: rgba(74,222,128,0.15);
  border: 1px solid rgba(74,222,128,0.3);
  color: #4ade80;
  font-size: 10px;
  font-weight: 700;
  border-radius: 20px;
  padding: 2px 8px;
}
.profit-badge.loss {
  background: rgba(248,113,113,0.15);
  border-color: rgba(248,113,113,0.3);
  color: #f87171;
}

/* ══════════════════════════════════════
   PERIOD TABS
══════════════════════════════════════ */
.tab-row {
  display: flex;
  gap: 8px;
  padding: 14px 14px 0;
  overflow-x: auto;
}
.tab-btn {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid #e0e0e0;
  background: #fff;
  font-size: 12px;
  font-weight: 700;
  color: #888;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn.active {
  background: #1a1a2e;
  border-color: #1a1a2e;
  color: #fff;
}

/* ── SECTION ── */
.section { padding: 14px 14px 0; }
.section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e8e8e8;
}

/* ── MIS CARD ── */
.mis-card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #ebebeb;
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.mis-card-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.mis-card-title { font-size: 14px; font-weight: 700; color: #1a1a2e; }
.mis-card-range { font-size: 11px; color: #888; margin-top: 2px; font-weight: 500; }
.mis-card-icon { font-size: 22px; opacity: 0.6; }

/* ── METRICS ROW ── */
.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: #f0f0f0;
}
.metrics.three { grid-template-columns: 1fr 1fr 1fr; }
.metric {
  background: #fff;
  padding: 14px 12px;
  text-align: center;
}
.metric-val {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -1px;
  color: #1a1a2e;
  line-height: 1;
}
.metric-val.money { font-size: 19px; }
.metric-val.green { color: #16a34a; }
.metric-val.red   { color: #dc2626; }
.metric-lbl {
  font-size: 10px;
  color: #888;
  margin-top: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

/* ── BREAKDOWN ── */
.breakdown { padding: 0 16px 14px; }
.breakdown-title {
  font-size: 11px;
  font-weight: 700;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 10px 0 6px;
  border-top: 1px solid #f0f0f0;
  margin-top: 2px;
}
.breakdown-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #f7f7f7;
  gap: 8px;
}
.breakdown-row:last-child { border-bottom: none; }
.br-name { font-size: 13px; font-weight: 500; color: #1a1a2e; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.br-time { font-size: 11px; color: #aaa; white-space: nowrap; }
.br-val  { font-size: 13px; font-weight: 700; color: #1a1a2e; white-space: nowrap; }
.br-val.green { color: #16a34a; }
.br-val.red   { color: #dc2626; }

/* ── CAMPAIGN TABLE ── */
.campaign-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid #f7f7f7;
}
.campaign-row:last-child { border-bottom: none; }
.camp-platform {
  background: #f0f0f0;
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 10px;
  font-weight: 700;
  color: #555;
  white-space: nowrap;
}
.camp-platform.meta   { background: #e8f0fe; color: #1a73e8; }
.camp-platform.google { background: #fef3e2; color: #f59e0b; }
.camp-platform.insta  { background: #fce7f3; color: #db2777; }
.camp-week { font-size: 12px; color: #666; flex: 1; }
.camp-amount { font-size: 13px; font-weight: 700; color: #dc2626; white-space: nowrap; }
.camp-notes { font-size: 10px; color: #aaa; }

/* ── ROI PILL ── */
.roi-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.roi-pill.good { background: #dcfce7; color: #16a34a; }
.roi-pill.bad  { background: #fee2e2; color: #dc2626; }

/* ── OVERVIEW SNAPSHOT ── */
.overview-snap {
  background: #fff;
  margin: 14px 14px 0;
  border-radius: 18px;
  border: 1px solid #e0e0e0;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.snap-header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  padding: 14px 16px 12px;
  text-align: center;
}
.snap-brand { font-size: 17px; font-weight: 800; color: #90e0ef; letter-spacing: -0.3px; }
.snap-title { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.snap-time  { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 4px; }

.snap-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}
.snap-col {
  padding: 14px 10px;
  text-align: center;
  border-right: 1px solid #f0f0f0;
}
.snap-col:last-child { border-right: none; }
.snap-col-mid { background: #fafafa; }
.snap-col-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.snap-col-date  { font-size: 9px; color: #aaa; margin-bottom: 8px; }
.snap-big    { font-size: 30px; font-weight: 900; color: #1a1a2e; line-height: 1; letter-spacing: -1px; }
.snap-money  { font-size: 15px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.5px; }
.snap-small-val { font-size: 13px; font-weight: 700; color: #444; }
.snap-sub-lbl { font-size: 9px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 1px; margin-bottom: 4px; }
.snap-divider { height: 1px; background: #f0f0f0; margin: 6px 0; }

.snap-today-orders { border-top: 1px solid #f0f0f0; padding: 10px 14px 12px; }
.snap-today-title  { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 8px; }
.snap-order-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid #f7f7f7;
}
.snap-order-row:last-of-type { border-bottom: none; }
.snap-order-num  { width: 18px; height: 18px; border-radius: 50%; background: #f0f0f0; font-size: 10px; font-weight: 700; color: #666; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.snap-order-name { flex: 1; font-size: 12px; font-weight: 600; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.snap-order-time { font-size: 10px; color: #aaa; white-space: nowrap; }
.snap-order-val  { font-size: 12px; font-weight: 700; color: #1a1a2e; white-space: nowrap; min-width: 55px; text-align: right; }
.snap-order-total-row { display: flex; align-items: center; gap: 8px; padding: 7px 0 0; border-top: 1.5px solid #e0e0e0; margin-top: 4px; }
.snap-empty { text-align: center; font-size: 12px; color: #bbb; padding: 10px 0; }
.snap-footer { text-align: center; font-size: 9px; color: #ccc; padding: 8px; border-top: 1px solid #f5f5f5; background: #fafafa; }

/* ── PROFIT ROW inside snap ── */
.snap-profit-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  border-top: 1.5px solid #f0f0f0;
  margin-top: 4px;
}
.snap-profit-cell {
  text-align: center;
  padding: 10px 8px;
  border-right: 1px solid #f0f0f0;
}
.snap-profit-cell:last-child { border-right: none; }
.spc-label { font-size: 9px; color: #aaa; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
.spc-val   { font-size: 14px; font-weight: 800; color: #1a1a2e; margin-top: 2px; }
.spc-val.green { color: #16a34a; }
.spc-val.red   { color: #dc2626; }

/* ── COMPARE PAGE ── */
.compare-header {
  background: linear-gradient(135deg,#1a1a2e,#0f3460);
  border-radius:16px; padding:16px; margin-bottom:12px;
  color:#fff; text-align:center;
}
.compare-header h2 { font-size:16px; font-weight:800; color:#90e0ef; margin-bottom:4px; }
.compare-header p  { font-size:11px; color:rgba(255,255,255,0.5); }

/* Bar chart */
.chart-wrap { background:#fff; border-radius:16px; border:1px solid #ebebeb; overflow:hidden; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.chart-title { font-size:13px; font-weight:700; color:#1a1a2e; padding:12px 14px 4px; }
.chart-sub   { font-size:11px; color:#888; padding:0 14px 10px; }
.bar-chart   { padding:0 14px 14px; }
.bar-row     { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.bar-label   { font-size:11px; font-weight:600; color:#555; width:52px; flex-shrink:0; text-align:right; }
.bar-track   { flex:1; background:#f0f0f0; border-radius:20px; height:28px; overflow:hidden; position:relative; }
.bar-fill    { height:100%; border-radius:20px; display:flex; align-items:center; padding-left:8px; transition:width 0.6s ease; min-width:32px; }
.bar-val     { font-size:11px; font-weight:800; color:#fff; white-space:nowrap; }
.bar-val-out { font-size:11px; font-weight:700; color:#1a1a2e; white-space:nowrap; flex-shrink:0; width:64px; text-align:right; }

/* Metric compare table */
.compare-table { width:100%; border-collapse:collapse; }
.compare-table th { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#888; padding:8px 10px; text-align:right; border-bottom:2px solid #f0f0f0; background:#fafafa; }
.compare-table th:first-child { text-align:left; }
.compare-table td { font-size:12px; padding:9px 10px; text-align:right; border-bottom:1px solid #f7f7f7; vertical-align:middle; }
.compare-table td:first-child { text-align:left; font-weight:600; color:#1a1a2e; }
.compare-table tr:last-child td { border-bottom:none; font-weight:800; background:#f7f7f7; }
.trend-up   { color:#16a34a; font-size:10px; font-weight:700; }
.trend-down { color:#dc2626; font-size:10px; font-weight:700; }
.trend-flat { color:#888;    font-size:10px; font-weight:700; }

/* Fish compare */
.fish-compare-row {
  display: grid;
  grid-template-columns: 1fr repeat(var(--month-count, 4), 72px);
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid #f7f7f7;
  gap: 0;
}
.fish-compare-name { font-size:12px; font-weight:600; color:#1a1a2e; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:8px; }
.fish-month-pill { background:#f0f0f0; border-radius:20px; padding:3px 6px; font-size:11px; font-weight:700; color:#444; white-space:nowrap; text-align:center; }
.fish-month-pill.best { background:#dcfce7; color:#16a34a; }
.loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 3px solid #eee; border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty-row { text-align: center; padding: 20px; color: #bbb; font-size: 13px; }

/* ── MAIN PAGE TABS ── */
.main-tab-row {
  display: flex;
  gap: 0;
  background: #fff;
  border-bottom: 2px solid #f0f0f0;
  position: sticky;
  top: 72px;
  z-index: 9;
  overflow-x: auto;
  scrollbar-width: none;
}
.main-tab-row::-webkit-scrollbar { display: none; }
.main-tab-btn {
  flex-shrink: 0;
  padding: 11px 16px;
  font-size: 12px;
  font-weight: 700;
  border: none;
  background: none;
  color: #999;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all 0.15s;
  white-space: nowrap;
}
.main-tab-btn.active {
  color: #1a1a2e;
  border-bottom-color: #1a1a2e;
}

.page-section { display: none; }
.page-section.active { display: block; }

/* ── WEEK FILTER CHIPS ── */
.week-chips {
  display: flex; gap: 6px;
  padding: 10px 14px;
  overflow-x: auto; scrollbar-width: none;
  background: #fff;
  border-bottom: 1px solid #f0f0f0;
}
.week-chips::-webkit-scrollbar { display: none; }
.week-chip {
  flex-shrink: 0; padding: 5px 12px;
  border-radius: 20px; font-size: 11px; font-weight: 700;
  border: 1.5px solid #e0e0e0;
  background: #fafafa; color: #888;
  cursor: pointer; white-space: nowrap;
}
.week-chip.active { background: #1a1a2e; border-color: #1a1a2e; color: #fff; }

/* ── WEEKLY FISH TABLE ── */
.fish-week-card {
  background: #fff;
  border-radius: 14px;
  border: 1px solid #ebebeb;
  overflow: hidden;
  margin-bottom: 10px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
}
.fish-week-header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid #f0f0f0;
  background: #fafafa;
}
.fish-week-title { font-size: 13px; font-weight: 700; color: #1a1a2e; }
.fish-week-meta  { font-size: 11px; color: #888; }
.fish-week-totals {
  display: flex; gap: 16px; padding: 8px 16px;
  border-bottom: 1px solid #f0f0f0;
}
.fwt-item { text-align: center; }
.fwt-val { font-size: 15px; font-weight: 800; color: #1a1a2e; }
.fwt-lbl { font-size: 9px; color: #aaa; font-weight: 600; text-transform: uppercase; }

/* ── CUSTOMER TABLE ── */
.cust-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.cust-table thead th {
  font-size: 10px; font-weight: 700; color: #888;
  text-transform: uppercase; letter-spacing: 0.4px;
  padding: 8px 12px; border-bottom: 1px solid #f0f0f0;
  text-align: left; background: #fafafa;
}
.cust-table tbody td {
  padding: 9px 12px; border-bottom: 1px solid #f7f7f7;
  vertical-align: top;
}
.cust-table tbody tr:last-child td { border-bottom: none; }
.cust-table tbody tr:nth-child(even) td { background: #fafafa; }
.cust-name-cell { font-weight: 600; color: #1a1a2e; font-size: 13px; }
.cust-phone-cell { font-size: 11px; color: #888; margin-top: 2px; }
.cust-orders-list { font-size: 11px; color: #555; }
.cust-order-row { padding: 2px 0; border-bottom: 1px dotted #eee; }
.cust-order-row:last-child { border-bottom: none; }

/* ── APRIL ARCHIVE ── */
.archive-badge {
  display: inline-block;
  background: #1a1a2e; color: #90e0ef;
  font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px;
  border-radius: 20px; padding: 3px 10px;
  margin-bottom: 10px;
}
.archive-fish-item {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 9px 0; border-bottom: 1px solid #f7f7f7;
  gap: 8px;
}
.archive-fish-item:last-child { border-bottom: none; }
.afi-name  { font-size: 12px; font-weight: 600; color: #1a1a2e; flex: 1; }
.afi-size  { font-size: 11px; color: #0077b6; font-weight: 600; white-space: nowrap; }
.afi-qty   { font-size: 13px; font-weight: 800; color: #1a1a2e; white-space: nowrap; min-width: 40px; text-align: right; }
.afi-kg    { font-size: 11px; color: #16a34a; font-weight: 700; white-space: nowrap; min-width: 55px; text-align: right; }
.afi-val   { font-size: 12px; font-weight: 700; color: #1a1a2e; white-space: nowrap; min-width: 65px; text-align: right; }

/* ── PDF BUTTON ── */
.pdf-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #1a1a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 9px 16px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  margin: 12px 14px 0;
  width: calc(100% - 28px);
  justify-content: center;
  transition: opacity 0.2s;
}
.pdf-btn:active { opacity: 0.75; }
.pdf-btn .pdf-icon { font-size: 15px; }

<script>
// ── CONFIG ──────────────────────────────────────────
const SHEET_ID   = '1LdJAHcoYX8ruxVEKG5j-X1KyaZohOLfhyYaUBmsVoyI';
const GID_ORDERS = '1633140334'; // Sheet2 - Orders
const GID_CAMPS  = '566235125';  // Sheet3 - Campaign Spend

const FY_START_MONTH = 3; // April

// ── DATE HELPERS ────────────────────────────────────
const today = new Date();
today.setHours(0,0,0,0);

function startOfDay(d) { const x=new Date(d); x.setHours(0,0,0,0); return x; }
function endOfDay(d)   { const x=new Date(d); x.setHours(23,59,59,999); return x; }

const todayStart = startOfDay(today);
const todayEnd   = endOfDay(today);
const mtdStart   = new Date(today.getFullYear(), today.getMonth(), 1);
const mtdEnd     = endOfDay(today);

function getFYStart() {
  const yr=today.getFullYear(), mon=today.getMonth();
  return new Date(mon < FY_START_MONTH ? yr-1 : yr, FY_START_MONTH, 1);
}
const ytdStart = getFYStart();

function fmt(d)      { return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtShort(d) { return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}); }
function fmtMoney(n) { return '₹'+n.toLocaleString('en-IN',{maximumFractionDigits:0}); }
function fmtTime(d)  { if(!d)return''; return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}); }

document.getElementById('fyStart').textContent    = fmt(ytdStart);

// ── GENERIC SHEET FETCHER ────────────────────────────
function fetchSheetByGID(gid) {
  return new Promise((resolve, reject) => {
    document.querySelectorAll(`script[id^="mis_${gid}"]`).forEach(s=>s.remove());
    const cb = '__misCB_' + gid + '_' + Date.now();
    const timer = setTimeout(()=>{ delete window[cb]; reject(new Error('Timeout')); }, 12000);

    window[cb] = function(data) {
      clearTimeout(timer);
      delete window[cb];
      try {
        if(!data.table) return reject(new Error('No table'));
        resolve(data.table);
      } catch(e) { reject(e); }
    };

    const s   = document.createElement('script');
    s.id      = `mis_${gid}_${Date.now()}`;
    s.src     = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&gid=${gid}&v=${Date.now()}`;
    s.onerror = ()=>{ clearTimeout(timer); reject(new Error('Load failed')); };
    document.head.appendChild(s);
  });
}

// ── PARSE ORDERS (Sheet2) ───────────────────────────
function parseOrders(table) {
  const labels = (table.cols||[]).map(c=>(c.label||'').trim());
  const fi = name => {
    let i = labels.findIndex(c=>c===name); if(i>=0)return i;
    i = labels.findIndex(c=>c.toLowerCase()===name.toLowerCase()); if(i>=0)return i;
    return labels.findIndex(c=>c.toLowerCase().includes(name.toLowerCase()));
  };
  const iTs      = fi('Timestamp');
  const iName    = fi('Name');
  const iPhone   = fi('Phone');
  const iTotal   = fi('Order Total');
  const iReport  = fi('Product Report');   // Col L
  const iBooked  = fi('Booked Date');      // Col M
  const iDeliv   = fi('Delivered Date');   // Col N ← main date for archive
  const iFishSold= fi('Fish Sold');        // Col O ← fish sold details

  const v  = (r,i)=>(i>=0&&r.c[i]&&r.c[i].v!=null)?String(r.c[i].v).trim():'';
  const fv = (r,i)=>(i>=0&&r.c[i])?(r.c[i].f||v(r,i)):'';

  const parseTs = (r,i) => {
    if(i<0||!r.c[i]||r.c[i].v==null) return null;
    const raw=r.c[i].v;
    if(typeof raw==='string'&&raw.startsWith('Date(')) {
      const p=raw.replace('Date(','').replace(')','').split(',');
      return new Date(+p[0],+p[1],+p[2],+(p[3]||0),+(p[4]||0));
    }
    if(r.c[i].f){ const d=new Date(r.c[i].f); if(!isNaN(d))return d; }
    // Try plain string parse
    const d = new Date(String(r.c[i].v));
    return isNaN(d) ? null : d;
  };
  const parseTotal = str=>{ if(!str)return 0; const n=parseFloat(str.replace(/[^0-9.]/g,'')); return isNaN(n)?0:n; };

  return (table.rows||[]).map(r=>({
    name:          v(r,iName),
    phone:         v(r,iPhone),
    ts:            parseTs(r,iTs),       // Timestamp — for overview/MTD/YTD
    bookedDate:    parseTs(r,iBooked),   // Col M
    deliveredDate: parseTs(r,iDeliv),    // Col N — used for archive reports
    fishSold:      v(r,iFishSold),       // Col O — fish sold string
    total:         parseTotal(fv(r,iTotal)||v(r,iTotal)),
    productReport: v(r,iReport),
  })).filter(o=>o.name&&o.name.length>1&&o.ts);
}

// Parse "Seer – Small Slices - 1kg ×2 | Baracuda – Medium Slices - 500g"
// → [{key, name, size, qty}, ...]
function parseProductReport(reportStr) {
  if(!reportStr) return [];
  return reportStr.split('|').map(seg=>{
    seg = seg.trim(); if(!seg) return null;
    const qtyMatch = seg.match(/×(\d+)\s*$/);
    const qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
    const key = seg.replace(/\s*×\d+\s*$/,'').trim();
    const sizeMatch = key.match(/[-–]\s*(\d+(?:\.\d+)?(?:g|kg))\s*$/i);
    const size = sizeMatch ? sizeMatch[1].toLowerCase() : '';
    const namePart = key.split(/\s*[–-]\s*/)[0].trim();
    return { key, qty, size, name: namePart };
  }).filter(Boolean);
}

// Aggregate fish sold across a set of orders
function buildFishReport(orders) {
  const map = {};
  orders.forEach(o=>{
    if(!o.productReport) return;
    const items = parseProductReport(o.productReport);
    const totalItemQty = items.reduce((a,item)=>a+item.qty, 0);
    items.forEach(item=>{
      if(!map[item.key]) map[item.key] = { key:item.key, name:item.name, size:item.size, totalQty:0, totalKg:0, totalValue:0 };
      map[item.key].totalQty += item.qty;
      const kg = item.size.endsWith('kg')
        ? parseFloat(item.size)*item.qty
        : item.size.endsWith('g')
          ? (parseFloat(item.size)/1000)*item.qty : 0;
      map[item.key].totalKg += kg;
      // Apportion order total by qty share
      if (totalItemQty > 0 && o.total > 0) {
        map[item.key].totalValue += o.total * item.qty / totalItemQty;
      }
    });
  });
  return Object.values(map).sort((a,b)=>b.totalQty-a.totalQty);
}

// ── PARSE CAMPAIGNS (Sheet3) ────────────────────────
function parseCampaigns(table) {
  const labels = (table.cols||[]).map(c=>(c.label||'').trim());
  const fi = name => {
    let i=labels.findIndex(c=>c===name); if(i>=0)return i;
    i=labels.findIndex(c=>c.toLowerCase()===name.toLowerCase()); if(i>=0)return i;
    return labels.findIndex(c=>c.toLowerCase().includes(name.toLowerCase()));
  };
  const iWeek     = fi('Week');
  const iPlatform = fi('Campaign Platform');
  const iAmount   = fi('Amount Spent');
  const iNotes    = fi('Notes');

  const v = (r,i)=>(i>=0&&r.c[i]&&r.c[i].v!=null)?String(r.c[i].v).trim():'';
  const parseAmt = str=>{ if(!str)return 0; const n=parseFloat(str.replace(/[^0-9.]/g,'')); return isNaN(n)?0:n; };

  return (table.rows||[]).map(r=>({
    week:     v(r,iWeek),
    platform: v(r,iPlatform),
    amount:   parseAmt(v(r,iAmount)),
    notes:    v(r,iNotes),
  })).filter(c=>c.week&&c.amount>0);
}

// ── HELPERS ─────────────────────────────────────────
// PRIMARY DATE = deliveredDate (Col N). Fallback to ts only if Col N is empty.
function getOrderDate(o) { return o.deliveredDate || o.ts; }
function inRange(o, start, end) {
  const d = getOrderDate(o);
  if (!d) return false;
  return d >= start && d <= end;
}
function delivInRange(o, start, end) { return inRange(o, start, end); } // same now
function sumTotal(list) { return list.reduce((acc,o)=>acc+o.total,0); }

// ── MONTH WEEK HELPERS ───────────────────────────────
// Get calendar weeks for a given year/month
// Week 1 = day 1-7, Week 2 = 8-14, Week 3 = 15-21, Week 4 = 22-end
function getMonthWeeks(year, month) {
  const lastDay = new Date(year, month+1, 0).getDate();
  return [
    { n:1, label:'Week 1', start: new Date(year,month,1),  end: new Date(year,month,7,23,59,59),
      dateLabel: `${fmtShort(new Date(year,month,1))} – ${fmtShort(new Date(year,month,7))}` },
    { n:2, label:'Week 2', start: new Date(year,month,8),  end: new Date(year,month,14,23,59,59),
      dateLabel: `${fmtShort(new Date(year,month,8))} – ${fmtShort(new Date(year,month,14))}` },
    { n:3, label:'Week 3', start: new Date(year,month,15), end: new Date(year,month,21,23,59,59),
      dateLabel: `${fmtShort(new Date(year,month,15))} – ${fmtShort(new Date(year,month,21))}` },
    { n:4, label:'Week 4', start: new Date(year,month,22), end: new Date(year,month,lastDay,23,59,59),
      dateLabel: `${fmtShort(new Date(year,month,22))} – ${fmtShort(new Date(year,month,lastDay))}` },
  ];
}

// ── WEEKLY HELPERS ────────────────────────────────────
// Get ISO week number
function getWeekNum(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

// Get Monday of the week containing date d
function weekStart(d) {
  const date = new Date(d);
  const day = date.getDay() || 7;
  date.setDate(date.getDate() - day + 1);
  date.setHours(0,0,0,0);
  return date;
}
function weekEnd(d) {
  const ws = weekStart(d);
  const we = new Date(ws);
  we.setDate(ws.getDate() + 6);
  we.setHours(23,59,59,999);
  return we;
}

// Build list of weeks from a set of orders (using deliveryDate if available, else ts)
function getWeeksFromOrders(orders) {
  const weekMap = {};
  orders.forEach(o => {
    const useDate = o.deliveryDate || o.ts;
    const ws = weekStart(useDate);
    const key = ws.toISOString().slice(0,10);
    if (!weekMap[key]) weekMap[key] = { ws, we: weekEnd(useDate), orders: [] };
    weekMap[key].orders.push(o);
  });
  return Object.entries(weekMap)
    .sort((a,b) => new Date(b[0]) - new Date(a[0]))
    .map(([k, v]) => ({ key: k, ws: v.ws, we: v.we, orders: v.orders }));
}

// Platform badge helper
function platformBadge(p) {
  const pl = (p||'').toLowerCase();
  if(pl.includes('meta')||pl.includes('facebook')) return `<span class="camp-platform meta">Meta</span>`;
  if(pl.includes('google')) return `<span class="camp-platform google">Google</span>`;
  if(pl.includes('insta')) return `<span class="camp-platform insta">Instagram</span>`;
  return `<span class="camp-platform">${p||'—'}</span>`;
}

// ── RENDER FISH TABLE (existing, unchanged) ───────────
function renderFishTable(fishList) {
  if(!fishList.length) return `<div class="empty-row">No product report data yet.<br><span style="font-size:11px;color:#bbb">Run Apps Script → generateAll() to fill Column L</span></div>`;
  const totalQty = fishList.reduce((a,f)=>a+f.totalQty,0);
  const totalKg  = fishList.reduce((a,f)=>a+f.totalKg,0);
  const rows = fishList.map(f => {
    const pct = totalQty > 0 ? Math.round((f.totalQty/totalQty)*100) : 0;
    const kgStr = f.totalKg > 0 ? f.totalKg.toFixed(2)+'kg' : '—';
    return `
      <div class="breakdown-row" style="flex-direction:column;align-items:stretch;gap:4px;padding:10px 0">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div class="br-name" style="font-size:12px;font-weight:600">${f.key}</div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <span style="font-size:11px;color:#888">${kgStr}</span>
            <span class="br-val" style="min-width:28px;text-align:right">${f.totalQty} qty</span>
          </div>
        </div>
        <div style="height:5px;background:#f0f0f0;border-radius:10px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#1a1a2e,#0f3460);border-radius:10px;transition:width 0.4s"></div>
        </div>
        <div style="font-size:9px;color:#bbb;text-align:right">${pct}% of total</div>
      </div>`;
  }).join('');
  return `
    <div class="breakdown">
      <div class="breakdown-title">Fish · Variant · Size → Qty sold</div>
      ${rows}
      <div class="breakdown-row" style="border-top:1.5px solid #e0e0e0;margin-top:6px;padding-top:10px">
        <div class="br-name" style="font-weight:700">Total</div>
        <div style="display:flex;gap:12px;align-items:center">
          <span style="font-size:12px;color:#666">${totalKg.toFixed(2)}kg</span>
          <span class="br-val">${totalQty} qty</span>
        </div>
      </div>
    </div>`;
}

// ── RENDER WEEKLY FISH TABLE (for Fish Report tab) ────
function renderWeeklyFishSection(allOrders, ytdStart, ytdEnd) {
  // Use deliveryDate (Col M) if available, fallback to timestamp
  const ordersWithDate = allOrders.filter(o => inRange(o, ytdStart, ytdEnd));
  const weeks = getWeeksFromOrders(ordersWithDate);
  if (!weeks.length) return `<div class="empty-row">No data available</div>`;

  // Build week chip buttons
  const chips = weeks.map((w, i) => {
    const label = `W${getWeekNum(w.ws)}: ${fmtShort(w.ws)}–${fmtShort(w.we)}`;
    return `<button class="week-chip ${i===0?'active':''}" id="wchip_${i}" onclick="showWeek(${i})">${label}</button>`;
  }).join('');

  // Build week panels
  const panels = weeks.map((w, i) => {
    const fish = buildFishReport(w.orders);
    const rev  = sumTotal(w.orders);
    const totalQty = fish.reduce((a,f)=>a+f.totalQty,0);
    const totalKg  = fish.reduce((a,f)=>a+f.totalKg,0);

    const fishRows = fish.length
      ? fish.map(f => `
          <div class="archive-fish-item">
            <div class="afi-name">${f.key}</div>
            <div class="afi-qty">${f.totalQty} qty</div>
            <div class="afi-kg">${f.totalKg.toFixed(2)} kg</div>
          </div>`).join('')
      : `<div class="empty-row" style="font-size:12px">No product data for this week</div>`;

    return `
      <div id="week_panel_${i}" class="fish-week-card" ${i>0?'style="display:none"':''}>
        <div class="fish-week-header">
          <div>
            <div class="fish-week-title">Week ${getWeekNum(w.ws)} · ${fmtShort(w.ws)} – ${fmtShort(w.we)}</div>
            <div class="fish-week-meta">${w.orders.length} orders · ${fmtMoney(rev)}</div>
          </div>
        </div>
        <div class="fish-week-totals">
          <div class="fwt-item"><div class="fwt-val">${w.orders.length}</div><div class="fwt-lbl">Orders</div></div>
          <div class="fwt-item"><div class="fwt-val">${totalQty}</div><div class="fwt-lbl">Total Qty</div></div>
          <div class="fwt-item"><div class="fwt-val">${totalKg.toFixed(1)}kg</div><div class="fwt-lbl">Weight</div></div>
          <div class="fwt-item"><div class="fwt-val">${fmtMoney(rev)}</div><div class="fwt-lbl">Revenue</div></div>
        </div>
        <div class="breakdown" style="padding:0 16px 12px">
          <div class="breakdown-title" style="padding-top:10px">Fish sold this week</div>
          ${fishRows}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="week-chips" id="weekChips">${chips}</div>
    <div style="padding:10px 14px 0">${panels}</div>`;
}

// ── RENDER CUSTOMER REPORT ────────────────────────────
function renderCustomerReport(allOrders) {
  const custMap = buildCustMap(allOrders);
  const custs   = Object.values(custMap)
    .sort((a, b) => b.totalSpend - a.totalSpend || b.orders.length - a.orders.length);

  if (!custs.length) return `<div class="empty-row">No customer data</div>`;

  // All unique months
  const monthSet = {};
  allOrders.forEach(o => {
    const d = o.deliveredDate || o.ts;
    if (!d) return;
    const k = d.getFullYear() + '-' + String(d.getMonth()).padStart(2,'0');
    if (!monthSet[k]) monthSet[k] = {
      key:k, year:d.getFullYear(), month:d.getMonth(),
      label: d.toLocaleDateString('en-IN',{month:'short',year:'numeric'})
    };
  });
  const months = Object.values(monthSet).sort((a,b)=>a.key.localeCompare(b.key));

  const rows = custs.map((c, i) => {
    // Fish summary for this customer
    const fishMap = {};
    c.orders.forEach(o => {
      const raw = o.productReport || '';
      if (!raw) return;
      raw.split('|').map(s => s.trim()).filter(Boolean).forEach(seg => {
        const dashIdx = seg.lastIndexOf(' - ');
        const name = dashIdx > 0 ? seg.slice(0, dashIdx).trim() : seg;
        fishMap[name] = (fishMap[name] || 0) + 1;
      });
    });
    const fishItems = Object.entries(fishMap)
      .sort((a,b) => b[1]-a[1])
      .map(([name, qty]) => `<div style="font-size:11px;color:#1a1a2e;padding:2px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;gap:8px"><span>${name}</span><span style="font-weight:700;color:#0077b6;white-space:nowrap">${qty} qty</span></div>`)
      .join('');

    const monthCols = months.map(m => {
      const mStart  = new Date(m.year, m.month, 1);
      const mEnd    = new Date(m.year, m.month+1, 0, 23, 59, 59);
      const mOrders = c.orders.filter(o => {
        const d = o.deliveredDate || o.ts;
        return d && d >= mStart && d <= mEnd;
      });
      if (!mOrders.length) return `<td style="text-align:center;color:#ddd;font-size:11px">—</td>`;
      return `<td style="text-align:center;vertical-align:top;padding:7px 6px">
        <div style="font-size:13px;font-weight:800;color:#1a1a2e">${mOrders.length}</div>
        <div style="font-size:10px;color:#0077b6;font-weight:600">${fmtMoney(sumTotal(mOrders))}</div>
      </td>`;
    }).join('');

    return `<tr>
      <td style="text-align:center;font-size:11px;color:#888;font-weight:600;padding:8px 6px">${i+1}</td>
      <td style="padding:8px 10px">
        <div style="font-size:13px;font-weight:700;color:#1a1a2e">${c.name}</div>
        ${c.aliases.length ? `<div style="font-size:10px;color:#bbb">${c.aliases.join(', ')}</div>` : ''}
        <div style="font-size:11px;color:#888">📞 ${c.phone}</div>
      </td>
      <td style="text-align:center;font-size:14px;font-weight:800;color:#1a1a2e;padding:8px 6px">${c.orders.length}</td>
      <td style="text-align:right;font-size:13px;font-weight:800;color:#1a1a2e;white-space:nowrap;padding:8px 10px">${fmtMoney(c.totalSpend)}</td>

// ── BUILD ARCHIVE MONTH CHIPS ────────────────────────
function buildArchiveMonthChips(allOrders, allCamps) {
  const monthSet = {};
  allOrders.forEach(o => {
    const d = getOrderDate(o);
    if (!d) return;
    const k = d.getFullYear() + '-' + String(d.getMonth()).padStart(2,'0');
    if (!monthSet[k]) monthSet[k] = {
      key:k, year:d.getFullYear(), month:d.getMonth(),
      label: d.toLocaleDateString('en-IN',{month:'short',year:'numeric'}),
      fullLabel: d.toLocaleDateString('en-IN',{month:'long',year:'numeric'}),
    };
  });

  const months = Object.values(monthSet).sort((a,b)=>b.key.localeCompare(a.key));
  const chipsEl = document.getElementById('archiveMonthChips');
  if (!chipsEl) return;

  if (!months.length) {
    chipsEl.innerHTML = '<div style="padding:10px;font-size:12px;color:#aaa">No delivery date data found (check Column N)</div>';
    return;
  }

  chipsEl.innerHTML = months.map((m,i) =>
    '<button class="mchip ' + (i===0?'active':'') + '" id="archm_'+i+'" onclick="showArchiveMonth('+i+')">'+m.label+'</button>'
  ).join('');

  window._archMonths = months.map(m => {
    const mStart = new Date(m.year, m.month, 1);
    const mEnd   = new Date(m.year, m.month+1, 0, 23, 59, 59);
    const orders = allOrders.filter(o => inRange(o, mStart, mEnd));
    return { ...m, mStart, mEnd, orders, allOrders, allCamps };
  });
  window._archAllCamps = allCamps;

  showArchiveMonth(0);
}

// ── DAILY BREAKDOWN ─────────────────────────────────
function renderDailyBreakdown(orders, start, end) {
  if(!orders.length) return `<div class="empty-row">No orders this month yet</div>`;
  const days=[];
  const cur=new Date(start);
  while(cur<=end){
    const ds=startOfDay(cur), de=endOfDay(cur);
    const dayOrders=orders.filter(o=>inRange(o,ds,de));
    if(dayOrders.length>0) days.push({date:new Date(cur),count:dayOrders.length,total:sumTotal(dayOrders)});
    cur.setDate(cur.getDate()+1);
  }
  return days.slice().reverse().map(d=>`
    <div class="breakdown-row">
      <div class="br-name">${d.date.toLocaleDateString("en-IN",{weekday:"short",day:"2-digit",month:"short"})}</div>
      <div class="br-time">${d.count} order${d.count>1?"s":""}</div>
      <div class="br-val">${fmtMoney(d.total)}</div>
    </div>`).join("");
}


// ── MONTHLY BREAKDOWN ────────────────────────────────
function renderMonthlyBreakdown(orders, start, end) {
  if(!orders.length) return `<div class="empty-row">No orders this year yet</div>`;
  const months=[];
  const cur=new Date(start.getFullYear(),start.getMonth(),1);
  while(cur<=end){
    const mS=new Date(cur.getFullYear(),cur.getMonth(),1);
    const mE=new Date(cur.getFullYear(),cur.getMonth()+1,0,23,59,59);
    const mOrders=orders.filter(o=>inRange(o,mS,mE));
    months.push({label:cur.toLocaleDateString('en-IN',{month:'long',year:'numeric'}),count:mOrders.length,total:sumTotal(mOrders)});
    cur.setMonth(cur.getMonth()+1);
  }
  return months.slice().reverse().map(m=>`
    <div class="breakdown-row">
      <div class="br-name">${m.label}</div>
      <div class="br-time">${m.count} order${m.count>1?'s':''}</div>
      <div class="br-val">${fmtMoney(m.total)}</div>
    </div>`).join('');
}

function downloadPDF() {

  style.id = 'printStyle';
  style.textContent = `
    @media print {
      .main-tab-row, .sync-row, .pdf-btn, .tab-row, .week-chips,
      .month-fish-chips, .sync-btn { display: none !important; }
      .page-section { display: block !important; }

      .profit-strip { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .overview-snap { break-inside: avoid; }
      .mis-card { break-inside: avoid; margin-bottom: 8px; }
      @page { margin: 15mm; size: A4; }

  `;
  document.head.appendChild(style);

  setTimeout(() => {
    window.print();
    setTimeout(() => {
      const s = document.getElementById('printStyle');
      if (s) s.remove();
    }, 1000);
  }, 300);
}

// ── MONTH-WISE FISH REPORT ────────────────────────────
function buildMonthFishChips(allOrders) {
  // Find all months that have orders (from ytdStart onwards)
  const monthSet = {};
  allOrders.forEach(o => {
    const d = o.ts;
    if (!d) return;
    const key = d.getFullYear() + '-' + String(d.getMonth()).padStart(2,'0');
    if (!monthSet[key]) {
      monthSet[key] = {
        year:  d.getFullYear(),
        month: d.getMonth(),
        label: d.toLocaleDateString('en-IN', { month: 'short', year: 'numeric' }),
        fullLabel: d.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' }),
      };
    }
  });

  const months = Object.entries(monthSet)
    .sort((a, b) => b[0].localeCompare(a[0])) // newest first
    .map(([k, v]) => v);

  if (!months.length) {
    document.getElementById('monthFishChips').innerHTML = '<div style="padding:10px;font-size:12px;color:#aaa">No data available</div>';
    return;
  }

  // Build chips
  document.getElementById('monthFishChips').innerHTML = months.map((m, i) =>
    `<button class="mchip ${i===0?'active':''}" id="mchip_${i}" onclick="showMonthFish(${i})">${m.label}</button>`
  ).join('');

  // Store months globally for showMonthFish
  window._monthFishData = months.map(m => {
    const mStart = new Date(m.year, m.month, 1);
    const mEnd   = new Date(m.year, m.month + 1, 0, 23, 59, 59);
    const mOrders = allOrders.filter(o => inRange(o, mStart, mEnd));
    return { ...m, mStart, mEnd, orders: mOrders };
  });

  // Show first month by default
  showMonthFish(0);
}

function showMonthFish(idx) {
  document.querySelectorAll('#monthFishChips .mchip').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  const data = window._monthFishData && window._monthFishData[idx];
  if (!data) return;

  const panel = document.getElementById('monthFishPanel');
  if (!panel) return;

  if (!data.orders.length) {
    panel.innerHTML = `<div class="empty-row" style="padding:20px">No orders in ${data.fullLabel}</div>`;
    return;
  }

  // Get all 4 weeks of this month with proper date ranges
  const weeks = getMonthWeeks(data.year, data.month).map(w => ({
    ...w,
    orders: data.orders.filter(o => inRange(o, w.start, w.end))
  }));

  // All fish across full month
  const fish     = buildFishReport(data.orders);
  const rev      = sumTotal(data.orders);
  const totalQty = fish.reduce((a,f)=>a+f.totalQty,0);
  const totalKg  = fish.reduce((a,f)=>a+f.totalKg,0);
  const totalVal = fish.reduce((a,f)=>a+f.totalValue,0);

  if (!fish.length) {
    panel.innerHTML = `<div class="empty-row" style="padding:20px">No product report data — run Apps Script generateAll()</div>`;
    return;

  const weekFish = weeks.map(w => {
    const wf = buildFishReport(w.orders);
    const wmap = {};

  panel.innerHTML = `

// ── SHARED CUSTOMER DEDUP (phone-only key) ─────────────
function buildCustMap(allOrders) {
  const custMap = {};
  allOrders.forEach(o => {
    // Phone-only as primary key — handles name variations
    const phone = (o.phone || '').replace(/\s/g, '').replace(/[^\d]/g, '');
    const key   = phone || ('noPhone_' + o.name.toLowerCase().trim());

    if (!custMap[key]) custMap[key] = {
      phone:      o.phone || '—',
      orders:     [],
      totalSpend: 0,
      nameCount:  {},  // track name frequency
    };
    custMap[key].orders.push(o);
    custMap[key].totalSpend += o.total;
    // Count name occurrences to pick most frequent
    const nm = o.name.trim();
    custMap[key].nameCount[nm] = (custMap[key].nameCount[nm] || 0) + 1;
  });

  // Pick most-frequent name as display name
  Object.values(custMap).forEach(c => {
    c.name = Object.entries(c.nameCount)
      .sort((a, b) => b[1] - a[1])[0][0];
    // Collect all name aliases for reference
    c.aliases = Object.keys(c.nameCount).filter(n => n !== c.name);
  });

  return custMap;
}

function buildPremiumCustomerCard(allOrders) {
  const custMap = buildCustMap(allOrders);
  const sorted  = Object.values(custMap)
    .sort((a, b) => b.totalSpend - a.totalSpend || b.orders.length - a.orders.length);
  const top3    = sorted.slice(0, 3);

  if (!top3.length) {
    document.getElementById('premiumCustomerCard').innerHTML = '<div class="empty-row">No customer data yet</div>';
    return;

  // Collect all unique months from all orders for month-wise columns

  allOrders.forEach(o => {
    const d = o.deliveredDate || o.ts;
    if (!d) return;
    const mk = d.getFullYear() + '-' + String(d.getMonth()).padStart(2,'0');
    if (!monthSet[mk]) monthSet[mk] = {
      key: mk, year: d.getFullYear(), month: d.getMonth(),
      label: d.toLocaleDateString('en-IN', {month:'short', year:'numeric'})
    };
  });
  const months = Object.values(monthSet).sort((a,b) => a.key.localeCompare(b.key));

  const html = top3.map((c, i) => {
    // Fish stats from productReport (Col L)
    const fishMap = {};
    c.orders.forEach(o => {
      const raw = o.productReport || '';
      if (!raw) return;
      raw.split('|').map(s => s.trim()).filter(Boolean).forEach(seg => {
        // "Seer - Vanjaram – Small Slices - 1kg" — use segment as key
        const dashIdx = seg.lastIndexOf(' - ');
        const name = dashIdx > 0 ? seg.slice(0, dashIdx).trim() : seg;
        fishMap[name] = (fishMap[name] || 0) + 1;
      });
    });
    const fishList     = Object.entries(fishMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

    // Month-wise purchase value

      const mEnd    = new Date(m.year, m.month+1, 0, 23, 59, 59);

      });
      if (!mOrders.length) return null;
      return {
        label:  m.label,
        count:  mOrders.length,
        value:  sumTotal(mOrders),

    // Order dates
    const dates = c.orders.map(o => {
      const d = o.deliveredDate || o.ts;
      return d ? d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}) : null;
    }).filter(Boolean);
    const uniqueDates = [...new Set(dates)];

          <div style="flex:1">
            <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">
              ${medals[i]} ${i===0?'Top Customer':i===1?'2nd Most Loyal':'3rd Most Loyal'}
            </div>
            <div style="font-size:17px;font-weight:800;color:#1a1a2e;line-height:1.2">${c.name}</div>

            <div style="font-size:12px;color:#888;margin-top:3px">📞 ${c.phone}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:24px;font-weight:900;color:#1a1a2e;line-height:1">${c.orders.length}</div>
            <div style="font-size:10px;color:#888;font-weight:600;text-transform:uppercase">Orders</div>
            <div style="font-size:15px;font-weight:800;color:#0077b6;margin-top:6px">${fmtMoney(c.totalSpend)}</div>
            <div style="font-size:10px;color:#888">Total Spent</div>
            <div style="font-size:11px;color:#888;margin-top:3px">Avg ${fmtMoney(Math.round(c.totalSpend/c.orders.length))}</div>

        ${monthCols.length ? `
        <div style="padding:10px 16px;border-bottom:1px solid #f0f0f0">
          <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">

          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">

        <div style="padding:10px 16px;border-bottom:1px solid #f0f0f0">

// ── DAY-WISE FISH CHIPS ───────────────────────────────
function buildDayFishChips(allOrders) {
  // Collect all unique days with orders (last 30 days)
  // Use LOCAL date key (not UTC) to avoid IST timezone split bug
  const dayMap = {};
  allOrders.forEach(o => {
    const d = o.deliveredDate || o.ts;
    if (!d) return;
    // Local date key: YYYY-MM-DD in IST (not UTC which can differ by +5:30)
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!dayMap[key]) dayMap[key] = { date: new Date(d.getFullYear(), d.getMonth(), d.getDate()), orders: [] };
    dayMap[key].orders.push(o);
  });

  const days = Object.entries(dayMap)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .slice(0, 30)
    .map(([k,v]) => v);

  const chipsEl = document.getElementById('dayFishChips');
  const panelEl = document.getElementById('dayFishPanel');
  if (!chipsEl || !panelEl) return;

  if (!days.length) {
    chipsEl.innerHTML = '<div style="padding:10px;font-size:12px;color:#aaa">No data</div>';
    return;
  }

  chipsEl.innerHTML = days.map((d, i) =>
    `<button class="mchip ${i===0?'active':''}" id="dchip_${i}" onclick="showDayFish(${i})">${d.date.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</button>`
  ).join('');

  window._dayFishData = days;
  showDayFish(0);
}

function showDayFish(idx) {
  document.querySelectorAll('[id^="dchip_"]').forEach((el,i) => el.classList.toggle('active', i===idx));
  const data = window._dayFishData && window._dayFishData[idx];
  if (!data) return;

  const fish     = buildFishReport(data.orders);
  const rev      = sumTotal(data.orders);
  const totalQty = fish.reduce((a,f)=>a+f.totalQty,0);
  const totalKg  = fish.reduce((a,f)=>a+f.totalKg,0);
  const panel    = document.getElementById('dayFishPanel');
  if (!panel) return;

  if (!data.orders.length) { panel.innerHTML=`<div class="empty-row">No orders</div>`; return; }
  if (!fish.length) { panel.innerHTML=`<div class="empty-row">No fish data for this day</div>`; return; }

  panel.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#f0f0f0">
      <div style="background:#fff;padding:10px 8px;text-align:center"><div style="font-size:18px;font-weight:800;color:#1a1a2e">${data.orders.length}</div><div style="font-size:10px;color:#888;font-weight:600;text-transform:uppercase">Orders</div></div>
      <div style="background:#fff;padding:10px 8px;text-align:center"><div style="font-size:18px;font-weight:800;color:#1a1a2e">${totalQty}</div><div style="font-size:10px;color:#888;font-weight:600;text-transform:uppercase">Qty</div></div>
      <div style="background:#fff;padding:10px 8px;text-align:center"><div style="font-size:15px;font-weight:800;color:#1a1a2e">${fmtMoney(rev)}</div><div style="font-size:10px;color:#888;font-weight:600;text-transform:uppercase">Revenue</div></div>
    </div>
    <div style="padding:8px 14px 4px;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.4px;border-top:1px solid #f0f0f0">
      ${data.date.toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long'})} · ${totalKg.toFixed(2)}kg total
    </div>
    ${fish.map(f => {
      const pct = totalQty>0?Math.round(f.totalQty/totalQty*100):0;
      return `<div style="padding:8px 14px;border-bottom:1px solid #f7f7f7">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <div style="font-size:12px;font-weight:600;color:#1a1a2e;flex:1">${f.key}</div>
          <div style="display:flex;gap:8px;flex-shrink:0">
            <span style="font-size:11px;color:#888">${f.totalKg>0?f.totalKg.toFixed(2)+'kg':'—'}</span>
            <span style="font-size:13px;font-weight:800;color:#1a1a2e">${f.totalQty} qty</span>
          </div>
        </div>
        <div style="height:4px;background:#f0f0f0;border-radius:10px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#1a1a2e,#0f3460);border-radius:10px"></div>
        </div>
      </div>`;
    }).join('')}
    <div style="display:flex;justify-content:space-between;padding:8px 14px;border-top:2px solid #1a1a2e;background:#fafafa">
      <span style="font-size:12px;font-weight:800">Total</span>
      <div style="display:flex;gap:12px">
        <span style="font-size:11px;color:#666;font-weight:600">${totalKg.toFixed(2)}kg</span>
        <span style="font-size:12px;font-weight:800">${totalQty} qty</span>
      </div>
    </div>`;
}

// ── CUSTOMER DATE-WISE PURCHASE ──────────────────────
function buildCustomerDateWise(allOrders) {
  const chipsEl = document.getElementById('custDateChips');
  const panelEl = document.getElementById('custDatePanel');
  if (!chipsEl || !panelEl) return;

  // Group by local date (IST) using deliveredDate or ts
  const dayMap = {};
  allOrders.forEach(o => {
    const d = o.deliveredDate || o.ts;
    if (!d) return;
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!dayMap[key]) dayMap[key] = { date: new Date(d.getFullYear(), d.getMonth(), d.getDate()), orders: [] };
    dayMap[key].orders.push(o);
  });

  const days = Object.entries(dayMap)
    .sort((a,b) => b[0].localeCompare(a[0]))  // latest first
    .map(([k,v]) => v);

  if (!days.length) {
    chipsEl.innerHTML = '<div style="padding:10px;font-size:12px;color:#aaa">No data</div>';
    return;
  }

  chipsEl.innerHTML = days.map((d, i) =>
    `<button class="mchip ${i===0?'active':''}" id="cdchip_${i}" onclick="showCustDate(${i})"
      style="white-space:nowrap">${d.date.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</button>`
  ).join('');

  window._custDateData = days;
  showCustDate(0);
}

function showCustDate(idx) {
  document.querySelectorAll('[id^="cdchip_"]').forEach((el,i) => el.classList.toggle('active', i===idx));
  const data = window._custDateData && window._custDateData[idx];
  const panelEl = document.getElementById('custDatePanel');
  if (!data || !panelEl) return;

  const orders    = data.orders;
  const dateLabel = data.date.toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const dayTotal  = orders.reduce((a,o)=>a+o.total,0);

  if (!orders.length) {
    panelEl.innerHTML = `<div class="empty-row">No orders on this date</div>`;
    return;
  }

  // Summary row
  let html = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#f0f0f0">
      <div style="background:#fff;padding:10px 8px;text-align:center">
        <div style="font-size:20px;font-weight:800;color:#1a1a2e">${orders.length}</div>
        <div style="font-size:10px;color:#888;font-weight:600;text-transform:uppercase">Orders</div>
      </div>
      <div style="background:#fff;padding:10px 8px;text-align:center">
        <div style="font-size:15px;font-weight:800;color:#1a1a2e">${fmtMoney(dayTotal)}</div>
        <div style="font-size:10px;color:#888;font-weight:600;text-transform:uppercase">Total</div>
      </div>
      <div style="background:#fff;padding:10px 8px;text-align:center">
        <div style="font-size:15px;font-weight:800;color:#1a1a2e">${fmtMoney(Math.round(dayTotal/orders.length))}</div>
        <div style="font-size:10px;color:#888;font-weight:600;text-transform:uppercase">Avg/Order</div>
      </div>
    </div>
    <div style="padding:8px 14px 6px;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid #f0f0f0">
      ${dateLabel}
    </div>`;

  // Customer rows
  html += orders.map((o, i) => {
    const products = o.productReport || '';
    // Parse product list for display
    const productLines = products ? products.split('|').map(p=>p.trim()).filter(Boolean) : [];
    return `
      <div style="padding:10px 14px;border-bottom:1px solid #f7f7f7">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
              ${i+1}. ${o.name}
            </div>
            ${o.phone ? `<div style="font-size:11px;color:#888;margin-top:1px">${o.phone}</div>` : ''}
            ${productLines.length ? `
              <div style="margin-top:5px">
                ${productLines.map(p=>`
                  <div style="font-size:11px;color:#555;padding:2px 0;border-bottom:1px solid #f5f5f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                    • ${p}
                  </div>`).join('')}
              </div>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:14px;font-weight:800;color:#1a1a2e">${fmtMoney(o.total)}</div>
            ${o.ts ? `<div style="font-size:10px;color:#aaa;margin-top:2px">${o.ts.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}</div>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');

  // Total row
  html += `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-top:2px solid #1a1a2e;background:#fafafa">
      <span style="font-size:12px;font-weight:800;color:#1a1a2e">${orders.length} customer${orders.length>1?'s':''}</span>
      <span style="font-size:14px;font-weight:900;color:#1a1a2e">${fmtMoney(dayTotal)}</span>
    </div>`;

  panelEl.innerHTML = html;
}

function showFishTab(tab) {

// ── MONTHLY COMPARE PAGE ─────────────────────────────
function buildComparePage(allOrders, allCamps) {
  const el = document.getElementById('compareContent');
  if (!el) return;

  // Build month map (local date key)
  const monthMap = {};
  allOrders.forEach(o => {
    const d = getOrderDate(o);
    if (!d) return;
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!monthMap[key]) monthMap[key] = {
      key, year: d.getFullYear(), month: d.getMonth(),
      label: d.toLocaleDateString('en-IN', {month:'short', year:'numeric'}),
      orders: []
    };
    monthMap[key].orders.push(o);
  });

  const months = Object.values(monthMap).sort((a,b) => a.key.localeCompare(b.key));
  if (months.length < 1) {
    el.innerHTML = '<div class="empty-row">Not enough data for comparison</div>';
    return;
  }

  // Compute metrics per month
  const metrics = months.map(m => {
    const rev      = sumTotal(m.orders);
    const fish     = buildFishReport(m.orders);
    const totalQty = fish.reduce((a,f) => a+f.totalQty, 0);
    const totalKg  = fish.reduce((a,f) => a+f.totalKg,  0);
    const avgOrder = m.orders.length ? Math.round(rev / m.orders.length) : 0;
    return { ...m, rev, fish, totalQty, totalKg, avgOrder };
  });

  const totalSpend = allCamps.reduce((a,c) => a+c.amount, 0);
  const maxRev     = Math.max(...metrics.map(m => m.rev), 1);
  const maxOrders  = Math.max(...metrics.map(m => m.orders.length), 1);
  const maxQty     = Math.max(...metrics.map(m => m.totalQty), 1);

  // Trend arrow helper
  function trend(curr, prev) {
    if (prev == null || prev === 0) return ''; // no prev or can't divide
    const pct = Math.round(((curr - prev) / prev) * 100);
    if (pct > 0)  return `<span class="trend-up">▲ ${pct}%</span>`;
    if (pct < 0)  return `<span class="trend-down">▼ ${Math.abs(pct)}%</span>`;
    return `<span class="trend-flat">— 0%</span>`;
  }

  // Bar chart builder
  function barChart(title, sub, data, colorFn, valFn, maxVal) {
    const bars = data.map(m => {
      const pct = maxVal > 0 ? Math.round((m / maxVal) * 100) : 0;
      const w   = Math.max(pct, 4);
      return `<div class="bar-row">
        <div class="bar-label">${metrics[data.indexOf(m)].label}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${w}%;background:${colorFn(pct)}">
            ${w > 20 ? `<span class="bar-val">${valFn(m)}</span>` : ''}
          </div>
        </div>
        ${w <= 20 ? `<div class="bar-val-out">${valFn(m)}</div>` : `<div class="bar-val-out" style="color:#888;font-size:10px">${pct}%</div>`}
      </div>`;
    }).join('');
    return `<div class="chart-wrap">
      <div class="chart-title">${title}</div>
      <div class="chart-sub">${sub}</div>
      <div class="bar-chart">${bars}</div>
    </div>`;
  }

  const revChart = barChart(
    '💰 Revenue — Month Wise', 'Total order value per month',
    metrics.map(m => m.rev),
    pct => `linear-gradient(90deg, #0f3460 ${pct}%, #1a1a2e)`,
    v => fmtMoney(v), maxRev
  );

  const ordChart = barChart(
    '📦 Orders — Month Wise', 'Number of orders per month',
    metrics.map(m => m.orders.length),
    pct => `linear-gradient(90deg, #2dd4b0 ${pct}%, #1aa38d)`,
    v => v + ' orders', maxOrders
  );

  const qtyChart = barChart(
    '🐟 Fish Qty — Month Wise', 'Total fish quantity sold per month',
    metrics.map(m => m.totalQty),
    pct => `linear-gradient(90deg, #6366f1 ${pct}%, #4f46e5)`,
    v => v + ' qty', maxQty
  );

  // Detailed comparison table
  const tableHead = `<tr>
    <th>Metric</th>
    ${metrics.map(m => `<th>${m.label}</th>`).join('')}
  </tr>`;

  function tableRow(label, fn, fmt) {
    const vals = metrics.map(fn);
    return `<tr>
      <td>${label}</td>
      ${vals.map((v,i) => {
        const t = i > 0 && vals[i-1] !== 0 ? trend(v, vals[i-1]) : '';
        return `<td>${fmt(v)}${t ? ' ' + t : ''}</td>`;
      }).join('')}
    </tr>`;
  }

  const tableHtml = `
    <div class="chart-wrap">
      <div class="chart-title">📋 Detailed Month-over-Month Comparison</div>
      <div class="chart-sub">All months · ▲ = growth vs previous month</div>
      <div style="overflow-x:auto;padding:0 0 12px">
        <table class="compare-table" style="min-width:${120 + metrics.length * 90}px">
          <thead>${tableHead}</thead>
          <tbody>
            ${tableRow('Orders',       m => m.orders.length,   v => v)}
            ${tableRow('Revenue',      m => m.rev,             v => fmtMoney(v))}
            ${tableRow('Avg/Order',    m => m.avgOrder,        v => fmtMoney(v))}
            ${tableRow('Fish Qty',     m => m.totalQty,        v => v + ' qty')}
            ${tableRow('Fish Weight',  m => m.totalKg,         v => v.toFixed(2) + 'kg')}
            <tr>
              <td>Campaign Spend</td>
              ${metrics.map(() => `<td style="color:#dc2626">−${fmtMoney(totalSpend)}</td>`).join('')}
            </tr>
            ${tableRow('Net Profit',   m => m.rev - totalSpend, v => `<span style="color:${v>=0?'#16a34a':'#dc2626'};font-weight:800">${fmtMoney(Math.abs(v))}</span>`)}
          </tbody>
        </table>
      </div>
    </div>`;

  // Top fish by month comparison
  // Collect all unique fish keys across all months
  const allFishKeys = [...new Set(metrics.flatMap(m => m.fish.map(f => f.key)))];
  const monthCount = metrics.length;
  const fishHeader = `<div style="display:grid;grid-template-columns:1fr repeat(${monthCount},72px);align-items:center;padding:10px 14px 8px;border-bottom:2px solid #f0f0f0;background:#fafafa;">
    <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.5px">Fish / Variant</div>
    ${metrics.map(m => `<div style="font-size:10px;font-weight:700;color:#888;text-align:center">${m.label}</div>`).join('')}
  </div>`;

  const fishRows = allFishKeys.slice(0, 25).map(key => {
    const monthQtys = metrics.map(m => {
      const f = m.fish.find(f => f.key === key);
      return f ? f.totalQty : 0;
    });
    const maxQ    = Math.max(...monthQtys);
    const bestIdx = monthQtys.indexOf(maxQ);
    return `<div class="fish-compare-row" style="--month-count:${monthCount}">
      <div class="fish-compare-name" title="${key}">${key}</div>
      ${monthQtys.map((q, i) =>
        `<div class="fish-month-pill ${i===bestIdx && q>0 ? 'best' : ''}">${q > 0 ? q+'qty' : '—'}</div>`
      ).join('')}
    </div>`;
  }).join('');

  const fishCompareHtml = `
    <div class="chart-wrap">
      <div class="chart-title">🐟 Fish Sales — Month Wise Comparison</div>
      <div class="chart-sub">Qty sold per fish type per month · 🟢 = best month</div>
      ${fishHeader}
      ${fishRows || '<div class="empty-row">No fish data in Product Report (Col L)</div>'}
      <div style="padding:8px 14px;font-size:10px;color:#aaa;border-top:1px solid #f0f0f0">
        Tip: Run Apps Script → generateAll() to populate Col L for fish data
      </div>
    </div>`;

  // Summary header
  const latest  = metrics[metrics.length - 1];
  const prev    = metrics.length > 1 ? metrics[metrics.length - 2] : null;
  const growth  = prev ? Math.round(((latest.rev - prev.rev) / (prev.rev||1)) * 100) : null;

  const headerHtml = `
    <div class="compare-header">
      <h2>📈 Monthly Comparative Overview</h2>
      <p>${metrics.length} month${metrics.length>1?'s':''} of data · ${metrics[0].label} → ${latest.label}</p>
      ${growth !== null ? `<div style="margin-top:8px;font-size:13px;font-weight:700;color:${growth>=0?'#4ade80':'#f87171'}">
        ${growth>=0?'▲':'▼'} ${Math.abs(growth)}% revenue vs last month
      </div>` : ''}
    </div>`;

  el.innerHTML = headerHtml + revChart + ordChart + qtyChart + tableHtml + fishCompareHtml;
}

// ── INIT ─────────────────────────────────────────────
async function init() {
  document.getElementById('syncInfo').textContent = 'Syncing…';
  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div>Fetching data…</div>';
  try {
    const [ordersTable, campsTable] = await Promise.all([
      fetchSheetByGID(GID_ORDERS),
      fetchSheetByGID(GID_CAMPS),
    ]);
    const orders = parseOrders(ordersTable);
    const camps  = parseCampaigns(campsTable);
    renderMIS(orders, camps);
    setArchiveTabName();
    buildMonthFishChips(orders);
    buildDayFishChips(orders);
    buildCustomerDateWise(orders);
    buildPremiumCustomerCard(orders);
    buildArchiveMonthChips(orders, camps);
    document.getElementById('syncInfo').textContent =
      `✓ Synced · ${new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    document.getElementById('syncInfo').textContent = '⚠ Could not connect';
    document.getElementById('content').innerHTML =
      `<div class="loading">⚠ ${e.message}<br><br>Make sure sheet is shared as<br>"Anyone with the link → Viewer"</div>`;
  }
}

init();
setInterval(init, 10 * 60 * 1000);
</script>
