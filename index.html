<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TruSea Fish — MIS Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  font-size: 14px;
  padding-bottom: 60px;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  padding: 18px 20px 14px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.header h1 {
  font-size: 20px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: -0.5px;
}
.header h1 span { color: #90e0ef; }
.header-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
  letter-spacing: 0.3px;
}
.sync-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
}
.sync-info {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}
.sync-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  color: #fff;
  cursor: pointer;
  transition: background 0.2s;
}
.sync-btn:active { opacity: 0.7; }

/* ── DATE BANNER ── */
.date-banner {
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.date-banner .today-lbl { font-size: 12px; color: #888; font-weight: 500; }
.date-banner .today-val { font-size: 13px; font-weight: 700; color: #1a1a2e; }

/* ══════════════════════════════════════
   TOP PROFIT SUMMARY STRIP
══════════════════════════════════════ */
.profit-strip {
  margin: 14px 14px 0;
  background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
  border-radius: 18px;
  padding: 18px 16px;
  box-shadow: 0 4px 20px rgba(26,26,46,0.25);
  position: relative;
  overflow: hidden;
}
.profit-strip::before {
  content: '🐟';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 52px;
  opacity: 0.08;
}
.profit-strip-title {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 12px;
}
.profit-3col {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}
.profit-col {
  text-align: center;
  padding: 0 8px;
  border-right: 1px solid rgba(255,255,255,0.1);
}
.profit-col:last-child { border-right: none; }
.profit-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 4px;
}
.profit-value {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.5px;
  line-height: 1;
}
.profit-value.green  { color: #4ade80; }
.profit-value.red    { color: #f87171; }
.profit-value.white  { color: #ffffff; }
.profit-value.cyan   { color: #90e0ef; }
.profit-sub {
  font-size: 9px;
  color: rgba(255,255,255,0.3);
  margin-top: 3px;
}
.profit-badge {
  display: inline-block;
  margin-top: 6px;
  background: rgba(74,222,128,0.15);
  border: 1px solid rgba(74,222,128,0.3);
  color: #4ade80;
  font-size: 10px;
  font-weight: 700;
  border-radius: 20px;
  padding: 2px 8px;
}
.profit-badge.loss {
  background: rgba(248,113,113,0.15);
  border-color: rgba(248,113,113,0.3);
  color: #f87171;
}

/* ══════════════════════════════════════
   PERIOD TABS
══════════════════════════════════════ */
.tab-row {
  display: flex;
  gap: 8px;
  padding: 14px 14px 0;
  overflow-x: auto;
}
.tab-btn {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid #e0e0e0;
  background: #fff;
  font-size: 12px;
  font-weight: 700;
  color: #888;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn.active {
  background: #1a1a2e;
  border-color: #1a1a2e;
  color: #fff;
}
/* ── Date / Month chips ── */
.mchip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid #e0e0e0;
  background: #fafafa;
  color: #888;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.mchip.active {
  background: #1a1a2e;
  border-color: #1a1a2e;
  color: #fff;
}

/* ── SECTION ── */
.section { padding: 14px 14px 0; }
.section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e8e8e8;
}

/* ── MIS CARD ── */
.mis-card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #ebebeb;
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.mis-card-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.mis-card-title { font-size: 14px; font-weight: 700; color: #1a1a2e; }
.mis-card-range { font-size: 11px; color: #888; margin-top: 2px; font-weight: 500; }
.mis-card-icon { font-size: 22px; opacity: 0.6; }

/* ── METRICS ROW ── */
.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: #f0f0f0;
}
.metrics.three { grid-template-columns: 1fr 1fr 1fr; }
.metric {
  background: #fff;
  padding: 14px 12px;
  text-align: center;
}
.metric-val {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -1px;
  color: #1a1a2e;
  line-height: 1;
}
.metric-val.money { font-size: 19px; }
.metric-val.green { color: #16a34a; }
.metric-val.red   { color: #dc2626; }
.metric-lbl {
  font-size: 10px;
  color: #888;
  margin-top: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

/* ── BREAKDOWN ── */
.breakdown { padding: 0 16px 14px; }
.breakdown-title {
  font-size: 11px;
  font-weight: 700;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 10px 0 6px;
  border-top: 1px solid #f0f0f0;
  margin-top: 2px;
}
.breakdown-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #f7f7f7;
  gap: 8px;
}
.breakdown-row:last-child { border-bottom: none; }
.br-name { font-size: 13px; font-weight: 500; color: #1a1a2e; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.br-time { font-size: 11px; color: #aaa; white-space: nowrap; }
.br-val  { font-size: 13px; font-weight: 700; color: #1a1a2e; white-space: nowrap; }
.br-val.green { color: #16a34a; }
.br-val.red   { color: #dc2626; }

/* ── CAMPAIGN TABLE ── */
.campaign-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid #f7f7f7;
}
.campaign-row:last-child { border-bottom: none; }
.camp-platform {
  background: #f0f0f0;
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 10px;
  font-weight: 700;
  color: #555;
  white-space: nowrap;
}
.camp-platform.meta   { background: #e8f0fe; color: #1a73e8; }
.camp-platform.google { background: #fef3e2; color: #f59e0b; }
.camp-platform.insta  { background: #fce7f3; color: #db2777; }
.camp-week { font-size: 12px; color: #666; flex: 1; }
.camp-amount { font-size: 13px; font-weight: 700; color: #dc2626; white-space: nowrap; }
.camp-notes { font-size: 10px; color: #aaa; }

/* ── ROI PILL ── */
.roi-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.roi-pill.good { background: #dcfce7; color: #16a34a; }
.roi-pill.bad  { background: #fee2e2; color: #dc2626; }

/* ── OVERVIEW SNAPSHOT ── */
.overview-snap {
  background: #fff;
  margin: 14px 14px 0;
  border-radius: 18px;
  border: 1px solid #e0e0e0;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.snap-header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  padding: 14px 16px 12px;
  text-align: center;
}
.snap-brand { font-size: 17px; font-weight: 800; color: #90e0ef; letter-spacing: -0.3px; }
.snap-title { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.snap-time  { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 4px; }

.snap-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}
.snap-col {
  padding: 14px 10px;
  text-align: center;
  border-right: 1px solid #f0f0f0;
}
.snap-col:last-child { border-right: none; }
.snap-col-mid { background: #fafafa; }
.snap-col-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.snap-col-date  { font-size: 9px; color: #aaa; margin-bottom: 8px; }
.snap-big    { font-size: 30px; font-weight: 900; color: #1a1a2e; line-height: 1; letter-spacing: -1px; }
.snap-money  { font-size: 15px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.5px; }
.snap-small-val { font-size: 13px; font-weight: 700; color: #444; }
.snap-sub-lbl { font-size: 9px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 1px; margin-bottom: 4px; }
.snap-divider { height: 1px; background: #f0f0f0; margin: 6px 0; }

.snap-today-orders { border-top: 1px solid #f0f0f0; padding: 10px 14px 12px; }
.snap-today-title  { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 8px; }
.snap-order-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid #f7f7f7;
}
.snap-order-row:last-of-type { border-bottom: none; }
.snap-order-num  { width: 18px; height: 18px; border-radius: 50%; background: #f0f0f0; font-size: 10px; font-weight: 700; color: #666; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.snap-order-name { flex: 1; font-size: 12px; font-weight: 600; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.snap-order-time { font-size: 10px; color: #aaa; white-space: nowrap; }
.snap-order-val  { font-size: 12px; font-weight: 700; color: #1a1a2e; white-space: nowrap; min-width: 55px; text-align: right; }
.snap-order-total-row { display: flex; align-items: center; gap: 8px; padding: 7px 0 0; border-top: 1.5px solid #e0e0e0; margin-top: 4px; }
.snap-empty { text-align: center; font-size: 12px; color: #bbb; padding: 10px 0; }
.snap-footer { text-align: center; font-size: 9px; color: #ccc; padding: 8px; border-top: 1px solid #f5f5f5; background: #fafafa; }

/* ── PROFIT ROW inside snap ── */
.snap-profit-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  border-top: 1.5px solid #f0f0f0;
  margin-top: 4px;
}
.snap-profit-cell {
  text-align: center;
  padding: 10px 8px;
  border-right: 1px solid #f0f0f0;
}
.snap-profit-cell:last-child { border-right: none; }
.spc-label { font-size: 9px; color: #aaa; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
.spc-val   { font-size: 14px; font-weight: 800; color: #1a1a2e; margin-top: 2px; }
.spc-val.green { color: #16a34a; }
.spc-val.red   { color: #dc2626; }

/* ── LOADING ── */
.loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 3px solid #eee; border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty-row { text-align: center; padding: 20px; color: #bbb; font-size: 13px; }

/* ── FOOTER ── */
.footer-note { text-align: center; font-size: 11px; color: #bbb; padding: 20px; }

/* ── COMPARATIVE CHART SECTION ── */
.comp-tab-row {
  display: flex; gap: 0;
  background: #fff;
  border-bottom: 2px solid #f0f0f0;
  overflow-x: auto; scrollbar-width: none;
}
.comp-tab-row::-webkit-scrollbar { display: none; }
.comp-tab {
  flex-shrink: 0; padding: 10px 16px;
  font-size: 12px; font-weight: 700;
  border: none; background: none;
  color: #999; cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px; white-space: nowrap;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.comp-tab.active { color: #1a1a2e; border-bottom-color: #1a1a2e; }
.comp-panel { display: none; }
.comp-panel.active { display: block; }
.comp-chart-wrap { padding: 14px; position: relative; }
.comp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.comp-table thead th {
  font-size: 10px; font-weight: 700; color: #fff;
  background: #1a1a2e; padding: 8px 10px;
  text-align: left; white-space: nowrap;
  -webkit-print-color-adjust: exact; print-color-adjust: exact;
}
.comp-table thead th:not(:first-child) { text-align: right; }
.comp-table tbody td { padding: 9px 10px; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
.comp-table tbody tr:nth-child(even) td { background: #fafafa; }
.comp-table tbody td:not(:first-child) { text-align: right; font-weight: 700; }
.comp-table tfoot td { padding: 9px 10px; font-weight: 800; background: #f0f0f0; border-top: 2px solid #1a1a2e; }
.comp-table tfoot td:not(:first-child) { text-align: right; }
.change-up   { color: #16a34a; font-size: 11px; font-weight: 700; }
.change-down { color: #dc2626; font-size: 11px; font-weight: 700; }
.change-nil  { color: #aaa; font-size: 11px; }
.metric-card-row {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 8px; padding: 12px 14px;
}
.mc { background: #f8fafc; border-radius: 10px; padding: 12px 10px; text-align: center; border: 1px solid #e8edf2; }
.mc-val { font-size: 18px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.5px; }
.mc-val.money { font-size: 14px; }
.mc-lbl { font-size: 9px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 3px; }
.best-month { background: #1a1a2e; color: #90e0ef; border-radius: 6px; padding: 2px 8px; font-size: 10px; font-weight: 700; display: inline-block; margin-top: 4px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>🐟 Tru<span>Sea</span> Fish</h1>
  <div class="header-sub">MIS REPORT · MANAGEMENT SUMMARY</div>
  <div class="sync-row">
    <span class="sync-info" id="syncInfo">Loading…</span>
    <button class="sync-btn" onclick="init()">⟳ Refresh</button>
  </div>
</div>

<!-- DATE BANNER -->
<div class="date-banner">
  <div>
    <div class="today-lbl">Report Date</div>
    <div class="today-val" id="reportDate">—</div>
  </div>
  <div style="text-align:right">
    <div class="today-lbl">Fiscal Year Start</div>
    <div class="today-val" id="fyStart">—</div>
  </div>
</div>

<!-- CONTENT -->
<div id="content">
  <div class="loading"><div class="spinner"></div>Fetching data from sheets…</div>
</div>

<!-- MONTHLY COMPARATIVE SECTION -->
<div id="compSection" style="display:none;padding:14px 14px 0">
  <div class="section-title">📊 Monthly Comparative Report</div>
  <div class="mis-card" style="overflow:hidden">
    <div class="mis-card-header">
      <div>
        <div class="mis-card-title">Month vs Month Analysis</div>
        <div class="mis-card-range" id="compRange">All months · YTD</div>
      </div>
      <button onclick="downloadSectionPDF('compSection','Monthly Comparative Report')" style="background:#1a1a2e;color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer">⬇️ PDF</button>
    </div>

    <!-- Key metrics strip -->
    <div class="metric-card-row" id="compMetricStrip"></div>

    <!-- Sub tabs -->
    <div class="comp-tab-row">
      <button class="comp-tab active" onclick="showCompTab('revenue',this)">📈 Revenue</button>
      <button class="comp-tab" onclick="showCompTab('orders',this)">📦 Orders</button>
      <button class="comp-tab" onclick="showCompTab('qty',this)">🐟 Fish Qty</button>
      <button class="comp-tab" onclick="showCompTab('customers',this)">👥 Customers</button>
      <button class="comp-tab" onclick="showCompTab('table',this)">📋 Full Table</button>
    </div>

    <!-- Revenue chart -->
    <div class="comp-panel active" id="comp_revenue">
      <div class="comp-chart-wrap" style="height:260px">
        <canvas id="chartRevenue"></canvas>
      </div>
      <div id="compRevTable" style="padding:0 14px 14px"></div>
    </div>

    <!-- Orders chart -->
    <div class="comp-panel" id="comp_orders">
      <div class="comp-chart-wrap" style="height:260px">
        <canvas id="chartOrders"></canvas>
      </div>
      <div id="compOrdTable" style="padding:0 14px 14px"></div>
    </div>

    <!-- Fish Qty chart -->
    <div class="comp-panel" id="comp_qty">
      <div class="comp-chart-wrap" style="height:260px">
        <canvas id="chartQty"></canvas>
      </div>
      <div id="compQtyTable" style="padding:0 14px 14px"></div>
    </div>

    <!-- Customers chart -->
    <div class="comp-panel" id="comp_customers">
      <div class="comp-chart-wrap" style="height:260px">
        <canvas id="chartCusts"></canvas>
      </div>
      <div id="compCustTable" style="padding:0 14px 14px"></div>
    </div>

    <!-- Full table -->
    <div class="comp-panel" id="comp_table">
      <div style="overflow-x:auto;padding:14px">
        <div id="compFullTable"></div>
      </div>
    </div>

  </div>
</div>

<div class="footer-note" id="footerNote"></div>

<script>
// ── CONFIG ──────────────────────────────────────────
const SHEET_ID   = '1LdJAHcoYX8ruxVEKG5j-X1KyaZohOLfhyYaUBmsVoyI';
const GID_ORDERS = '1633140334'; // Sheet2 - Orders
const GID_CAMPS  = '566235125';  // Sheet3 - Campaign Spend

const FY_START_MONTH = 3; // April

// ── DATE HELPERS ────────────────────────────────────
const today = new Date();
today.setHours(0,0,0,0);

function startOfDay(d) { const x=new Date(d); x.setHours(0,0,0,0); return x; }
function endOfDay(d)   { const x=new Date(d); x.setHours(23,59,59,999); return x; }

const todayStart = startOfDay(today);
const todayEnd   = endOfDay(today);
const mtdStart   = new Date(today.getFullYear(), today.getMonth(), 1);
const mtdEnd     = endOfDay(today);

function getFYStart() {
  const yr=today.getFullYear(), mon=today.getMonth();
  return new Date(mon < FY_START_MONTH ? yr-1 : yr, FY_START_MONTH, 1);
}
const ytdStart = getFYStart();
const ytdEnd   = endOfDay(today);

function fmt(d)      { return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtShort(d) { return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}); }
function fmtMoney(n) { return '₹'+n.toLocaleString('en-IN',{maximumFractionDigits:0}); }
function fmtTime(d)  { if(!d)return''; return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}); }

document.getElementById('fyStart').textContent    = fmt(ytdStart);

// ── GENERIC SHEET FETCHER ────────────────────────────
function fetchSheetByGID(gid) {
  return new Promise((resolve, reject) => {
    document.querySelectorAll(`script[id^="mis_${gid}"]`).forEach(s=>s.remove());
    const cb = '__misCB_' + gid + '_' + Date.now();
    const timer = setTimeout(()=>{ delete window[cb]; reject(new Error('Timeout')); }, 12000);

    window[cb] = function(data) {
      clearTimeout(timer);
      delete window[cb];
      try {
        if(!data.table) return reject(new Error('No table'));
        resolve(data.table);
      } catch(e) { reject(e); }
    };

    const s   = document.createElement('script');
    s.id      = `mis_${gid}_${Date.now()}`;
    s.src     = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&gid=${gid}&v=${Date.now()}`;
    s.onerror = ()=>{ clearTimeout(timer); reject(new Error('Load failed')); };
    document.head.appendChild(s);
  });
}

// ── PARSE ORDERS (Sheet2) ───────────────────────────
function parseOrders(table) {
  const labels = (table.cols||[]).map(c=>(c.label||'').trim());
  const fi = name => {
    let i = labels.findIndex(c=>c===name); if(i>=0)return i;
    i = labels.findIndex(c=>c.toLowerCase()===name.toLowerCase()); if(i>=0)return i;
    return labels.findIndex(c=>c.toLowerCase().includes(name.toLowerCase()));
  };
  const iTs     = fi('Timestamp');
  const iName   = fi('Name');
  const iTotal  = fi('Order Total');
  const iReport = fi('Product Report'); // Col L

  const v  = (r,i)=>(i>=0&&r.c[i]&&r.c[i].v!=null)?String(r.c[i].v).trim():'';
  const fv = (r,i)=>(i>=0&&r.c[i])?(r.c[i].f||v(r,i)):'';

  const parseTs = (r,i) => {
    if(i<0||!r.c[i]||r.c[i].v==null) return null;
    const raw=r.c[i].v;
    if(typeof raw==='string'&&raw.startsWith('Date(')) {
      const p=raw.replace('Date(','').replace(')','').split(',');
      return new Date(+p[0],+p[1],+p[2],+(p[3]||0),+(p[4]||0));
    }
    if(r.c[i].f){ const d=new Date(r.c[i].f); if(!isNaN(d))return d; }
    return null;
  };
  const parseTotal = str=>{ if(!str)return 0; const n=parseFloat(str.replace(/[^0-9.]/g,'')); return isNaN(n)?0:n; };

  return (table.rows||[]).map(r=>({
    name:          v(r,iName),
    ts:            parseTs(r,iTs),
    total:         parseTotal(fv(r,iTotal)||v(r,iTotal)),
    productReport: v(r,iReport), // "Seer – Small Slices - 1kg ×2 | Baracuda – Medium Slices - 500g"
  })).filter(o=>o.name&&o.name.length>1&&o.ts);
}

// Parse "Seer – Small Slices - 1kg ×2 | Baracuda – Medium Slices - 500g"
// → [{key, name, size, qty}, ...]
function parseProductReport(reportStr) {
  if(!reportStr) return [];
  return reportStr.split('|').map(seg=>{
    seg = seg.trim(); if(!seg) return null;
    const qtyMatch = seg.match(/×(\d+)\s*$/);
    const qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
    const key = seg.replace(/\s*×\d+\s*$/,'').trim();
    const sizeMatch = key.match(/[-–]\s*(\d+(?:\.\d+)?(?:g|kg))\s*$/i);
    const size = sizeMatch ? sizeMatch[1].toLowerCase() : '';
    const namePart = key.split(/\s*[–-]\s*/)[0].trim();
    return { key, qty, size, name: namePart };
  }).filter(Boolean);
}

// Aggregate fish sold across a set of orders
function buildFishReport(orders) {
  const map = {};
  orders.forEach(o=>{
    if(!o.productReport) return;
    parseProductReport(o.productReport).forEach(item=>{
      if(!map[item.key]) map[item.key] = { key:item.key, name:item.name, size:item.size, totalQty:0, totalKg:0 };
      map[item.key].totalQty += item.qty;
      const kg = item.size.endsWith('kg')
        ? parseFloat(item.size)*item.qty
        : item.size.endsWith('g')
          ? (parseFloat(item.size)/1000)*item.qty : 0;
      map[item.key].totalKg += kg;
    });
  });
  return Object.values(map).sort((a,b)=>b.totalQty-a.totalQty);
}

// ── PARSE CAMPAIGNS (Sheet3) ────────────────────────
function parseCampaigns(table) {
  const labels = (table.cols||[]).map(c=>(c.label||'').trim());
  const fi = name => {
    let i=labels.findIndex(c=>c===name); if(i>=0)return i;
    i=labels.findIndex(c=>c.toLowerCase()===name.toLowerCase()); if(i>=0)return i;
    return labels.findIndex(c=>c.toLowerCase().includes(name.toLowerCase()));
  };
  const iWeek     = fi('Week');
  const iPlatform = fi('Campaign Platform');
  const iAmount   = fi('Amount Spent');
  const iNotes    = fi('Notes');

  const v = (r,i)=>(i>=0&&r.c[i]&&r.c[i].v!=null)?String(r.c[i].v).trim():'';
  const parseAmt = str=>{ if(!str)return 0; const n=parseFloat(str.replace(/[^0-9.]/g,'')); return isNaN(n)?0:n; };

  return (table.rows||[]).map(r=>({
    week:     v(r,iWeek),
    platform: v(r,iPlatform),
    amount:   parseAmt(v(r,iAmount)),
    notes:    v(r,iNotes),
  })).filter(c=>c.week&&c.amount>0);
}

// ── HELPERS ─────────────────────────────────────────
function inRange(o, start, end) { if(!o.ts)return false; return o.ts>=start&&o.ts<=end; }
function sumTotal(list) { return list.reduce((acc,o)=>acc+o.total,0); }

// ── DAILY BREAKDOWN ─────────────────────────────────
function renderDailyBreakdown(orders, start, end) {
  if(!orders.length) return `<div class="empty-row">No orders this month yet</div>`;
  const days=[];
  const cur=new Date(start);
  while(cur<=end){
    const ds=startOfDay(cur), de=endOfDay(cur);
    const dayOrders=orders.filter(o=>inRange(o,ds,de));
    if(dayOrders.length>0) days.push({date:new Date(cur),count:dayOrders.length,total:sumTotal(dayOrders)});
    cur.setDate(cur.getDate()+1);
  }
  return days.slice().reverse().map(d=>`
    <div class="breakdown-row">
      <div class="br-name">${d.date.toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'})}</div>
      <div class="br-time">${d.count} order${d.count>1?'s':''}</div>
      <div class="br-val">${fmtMoney(d.total)}</div>
    </div>`).join('');
}

// ── MONTHLY BREAKDOWN ────────────────────────────────
function renderMonthlyBreakdown(orders, start, end) {
  if(!orders.length) return `<div class="empty-row">No orders this year yet</div>`;
  const months=[];
  const cur=new Date(start.getFullYear(),start.getMonth(),1);
  while(cur<=end){
    const mS=new Date(cur.getFullYear(),cur.getMonth(),1);
    const mE=new Date(cur.getFullYear(),cur.getMonth()+1,0,23,59,59);
    const mOrders=orders.filter(o=>inRange(o,mS,mE));
    months.push({label:cur.toLocaleDateString('en-IN',{month:'long',year:'numeric'}),count:mOrders.length,total:sumTotal(mOrders)});
    cur.setMonth(cur.getMonth()+1);
  }
  return months.slice().reverse().map(m=>`
    <div class="breakdown-row">
      <div class="br-name">${m.label}</div>
      <div class="br-time">${m.count} order${m.count>1?'s':''}</div>
      <div class="br-val">${fmtMoney(m.total)}</div>
    </div>`).join('');
}

  try {

// ── PRIMARY DATE: Col N (Delivered Date) ─────────────
function getOrderDate(o) { return o.deliveredDate || o.ts; }

// Override inRange to use Col N
function inRange(o, start, end) {
  const d = getOrderDate(o);
  if (!d) return false;
  return d >= start && d <= end;
}

// ── WEEK RANGES (date-based, not ISO weeks) ───────────
// Week 1=1-7, Week 2=8-14, Week 3=15-21, Week 4=22-end
function getMonthWeeks(year, month) {
  const lastDay = new Date(year, month+1, 0).getDate();
  return [
    { n:1, label:'Week 1', dateLabel:`${fmtShort(new Date(year,month,1))} – ${fmtShort(new Date(year,month,7))}`,
      start:new Date(year,month,1), end:new Date(year,month,7,23,59,59) },
    { n:2, label:'Week 2', dateLabel:`${fmtShort(new Date(year,month,8))} – ${fmtShort(new Date(year,month,14))}`,
      start:new Date(year,month,8), end:new Date(year,month,14,23,59,59) },
    { n:3, label:'Week 3', dateLabel:`${fmtShort(new Date(year,month,15))} – ${fmtShort(new Date(year,month,21))}`,
      start:new Date(year,month,15), end:new Date(year,month,21,23,59,59) },
    { n:4, label:'Week 4', dateLabel:`${fmtShort(new Date(year,month,22))} – ${fmtShort(new Date(year,month,lastDay))}`,
      start:new Date(year,month,22), end:new Date(year,month,lastDay,23,59,59) },
  ];
}

// ── CUSTOMER DEDUP BY PHONE ───────────────────────────
function buildCustMap(orders) {
  const map = {};
  orders.forEach(o => {
    const phone = (o.phone||'').replace(/\s/g,'').replace(/[^\d]/g,'');
    const key   = phone || ('noPhone_'+o.name.toLowerCase().trim());
    if (!map[key]) map[key] = { phone:o.phone||'—', orders:[], totalSpend:0, nameCount:{} };
    map[key].orders.push(o);
    map[key].totalSpend += o.total;
    const nm = o.name.trim();
    map[key].nameCount[nm] = (map[key].nameCount[nm]||0) + 1;
  });
  Object.values(map).forEach(c => {
    c.name    = Object.entries(c.nameCount).sort((a,b)=>b[1]-a[1])[0][0];
    c.aliases = Object.keys(c.nameCount).filter(n=>n!==c.name);
  });
  return map;
}

// ── buildFishReport with totalValue ──────────────────
function buildFishReport(orders) {
  const map = {};
  orders.forEach(o => {
    if (!o.productReport) return;
    const items = parseProductReport(o.productReport);
    const tq    = items.reduce((a,i)=>a+i.qty,0);
    items.forEach(item => {
      if (!map[item.key]) map[item.key] = { key:item.key, name:item.name, size:item.size, totalQty:0, totalKg:0, totalValue:0 };
      map[item.key].totalQty   += item.qty;
      const kg = item.size.endsWith('kg') ? parseFloat(item.size)*item.qty
               : item.size.endsWith('g')  ? parseFloat(item.size)/1000*item.qty : 0;
      map[item.key].totalKg    += kg;
      if (tq > 0 && o.total > 0) map[item.key].totalValue += o.total * item.qty / tq;
    });
  });
  return Object.values(map).sort((a,b)=>b.totalQty-a.totalQty);
}

  const dayMap = {};

    const k = d.toISOString().slice(0,10);
    if (!dayMap[k]) dayMap[k] = { date:new Date(d), orders:[] };
    dayMap[k].orders.push(o);
  });
  // Deduplicate by date key — no duplicates
  const days = Object.entries(dayMap)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .slice(0, 60)
    .map(([k,v]) => v);

  const chipsEl = document.getElementById('dayFishChips');

  if (!days.length) { chipsEl.innerHTML='<div style="padding:10px;font-size:12px;color:#aaa">No delivery dates found (check Col N)</div>'; return; }

  chipsEl.innerHTML = days.map((d,i) =>
    `<button class="mchip ${i===0?'active':''}" id="dchip_${i}" onclick="showDayFish(${i})">${d.date.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</button>`

    <div class="section-title">👥 Customer Purchase — Date Wise</div>
    <div class="mis-card" id="custDateCard" style="overflow:hidden">
      <div class="mis-card-header">
        <div><div class="mis-card-title">Who Bought What — By Delivered Date</div><div class="mis-card-range">Col N · Select a date</div></div>
        <button onclick="downloadSectionPDF('custDateCard','Customer Date-wise Purchase')" style="background:#1a1a2e;color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer">⬇️ PDF</button>
      </div>
      <div class="month-fish-chips" id="custDateChips" style="display:flex;gap:6px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1px solid #f0f0f0;flex-wrap:nowrap"></div>
      <div id="custDatePanel"></div>
    </div>`;
  content.appendChild(custSection);

  // Build after DOM is ready
  setTimeout(() => {
    buildDayFishChips(allOrders);
    buildCustomerDateWise(allOrders);
  }, 100);
}

// ── UPDATED INIT ──────────────────────────────────────
const _origInit = init;
async function init() {
  document.getElementById('syncInfo').textContent = 'Syncing…';
  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div>Fetching data…</div>';
  try {
    const [ordersTable, campsTable] = await Promise.all([
      fetchSheetByGID(GID_ORDERS),
      fetchSheetByGID(GID_CAMPS),
    ]);
    // Updated parseOrders with Col N, O, phone
    const labels  = (ordersTable.cols||[]).map(c=>(c.label||'').trim());
    const fi = name => {
      let i=labels.findIndex(c=>c===name); if(i>=0)return i;
      i=labels.findIndex(c=>c.toLowerCase()===name.toLowerCase()); if(i>=0)return i;
      return labels.findIndex(c=>c.toLowerCase().includes(name.toLowerCase()));
    };
    const iTs=fi('Timestamp'), iName=fi('Name'), iPhone=fi('Phone'),
          iTotal=fi('Order Total'), iReport=fi('Product Report'),
          iDeliv=fi('Delivered Date'), iBooked=fi('Booked Date');
    const v=(r,i)=>(i>=0&&r.c[i]&&r.c[i].v!=null)?String(r.c[i].v).trim():'';
    const fv=(r,i)=>(i>=0&&r.c[i])?(r.c[i].f||v(r,i)):'';
    const parseD=(r,i)=>{
      if(i<0||!r.c[i]||r.c[i].v==null)return null;
      const raw=r.c[i].v;
      if(typeof raw==='string'&&raw.startsWith('Date(')){
        const p=raw.replace('Date(','').replace(')','').split(',');
        return new Date(+p[0],+p[1],+p[2],+(p[3]||0),+(p[4]||0));
      }
      if(r.c[i].f){const d=new Date(r.c[i].f);if(!isNaN(d))return d;}
      const d=new Date(String(r.c[i].v));return isNaN(d)?null:d;
    };
    const parseTotal=str=>{if(!str)return 0;const n=parseFloat(str.replace(/[^0-9.]/g,''));return isNaN(n)?0:n;};

    const orders = (ordersTable.rows||[]).map(r=>({
      name:          v(r,iName),
      phone:         v(r,iPhone),
      ts:            parseD(r,iTs),
      deliveredDate: parseD(r,iDeliv),
      bookedDate:    parseD(r,iBooked),
      total:         parseTotal(fv(r,iTotal)||v(r,iTotal)),
      productReport: v(r,iReport),
    })).filter(o=>o.name&&o.name.length>1&&o.ts);

    const camps = parseCampaigns(campsTable);
    renderMIS(orders, camps);
    buildComparativeReport(orders);
    document.getElementById('syncInfo').textContent =
      `✓ Synced · ${new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    document.getElementById('syncInfo').textContent = '⚠ Could not connect';
    document.getElementById('content').innerHTML =
      `<div class="loading">⚠ ${e.message}<br><br>Make sure sheet is shared as<br>"Anyone with the link → Viewer"</div>`;
  }
}

// ── MONTHLY COMPARATIVE REPORT ────────────────────────
let _compCharts = {};

function showCompTab(tab, el) {
  document.querySelectorAll('.comp-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.comp-panel').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  const panel = document.getElementById('comp_' + tab);
  if (panel) panel.classList.add('active');
}

function buildComparativeReport(allOrders) {
  // Collect all months that have data (using Col N)
  const monthSet = {};
  allOrders.forEach(o => {
    const d = getOrderDate(o); if (!d) return;
    const k = d.getFullYear() + '-' + String(d.getMonth()).padStart(2,'0');
    if (!monthSet[k]) monthSet[k] = {
      key: k, year: d.getFullYear(), month: d.getMonth(),
      label: d.toLocaleDateString('en-IN', {month:'short', year:'numeric'}),
      shortLabel: d.toLocaleDateString('en-IN', {month:'short'}),
      orders: []
    };
    monthSet[k].orders.push(o);
  });

  const months = Object.values(monthSet).sort((a,b) => a.key.localeCompare(b.key));
  if (months.length < 1) return;

  // Per-month metrics
  const data = months.map(m => {
    const rev   = sumTotal(m.orders);
    const fish  = buildFishReport(m.orders);
    const qty   = fish.reduce((a,f) => a+f.totalQty, 0);
    const custs = Object.keys(buildCustMap(m.orders)).length;
    const avg   = m.orders.length > 0 ? Math.round(rev / m.orders.length) : 0;
    return { ...m, rev, qty, custs, avg, fishCount: fish.length };
  });

  const labels      = data.map(d => d.label);
  const shortLabels = data.map(d => d.shortLabel);
  const revData     = data.map(d => d.rev);
  const ordData     = data.map(d => d.orders.length);
  const qtyData     = data.map(d => d.qty);
  const custData    = data.map(d => d.custs);

  // Best month
  const bestRevIdx  = revData.indexOf(Math.max(...revData));
  const bestOrdIdx  = ordData.indexOf(Math.max(...ordData));
  const totalRev    = revData.reduce((a,b)=>a+b,0);
  const totalOrds   = ordData.reduce((a,b)=>a+b,0);
  const totalQty    = qtyData.reduce((a,b)=>a+b,0);
  const avgRev      = totalOrds > 0 ? Math.round(totalRev / totalOrds) : 0;

  // ── Metric strip ──
  document.getElementById('compMetricStrip').innerHTML = [
    { val: months.length, lbl: 'Months', extra: '' },
    { val: fmtMoney(totalRev), lbl: 'Total Revenue', extra: '', money: true },
    { val: totalOrds, lbl: 'Total Orders', extra: '' },
    { val: totalQty, lbl: 'Total Fish Qty', extra: '' },
    { val: fmtMoney(avgRev), lbl: 'Avg Order Value', extra: '', money: true },
    { val: data[bestRevIdx]?.shortLabel||'—', lbl: 'Best Month', extra: '', best: true },
  ].map(m => `
    <div class="mc">
      <div class="mc-val ${m.money?'money':''}">${m.val}</div>
      <div class="mc-lbl">${m.lbl}</div>
      ${m.best ? `<div class="best-month">🏆 ${m.val}</div>` : ''}
    </div>`).join('');

  document.getElementById('compMetricStrip').style.gridTemplateColumns = 'repeat(3,1fr)';

  // ── Chart helper ──
  function makeChart(canvasId, chartData, label, color, type='bar') {
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    if (_compCharts[canvasId]) { _compCharts[canvasId].destroy(); delete _compCharts[canvasId]; }
    _compCharts[canvasId] = new Chart(ctx, {
      type: type,
      data: {
        labels: shortLabels,
        datasets: [{
          label,
          data: chartData,
          backgroundColor: type === 'bar' ? color + '99' : undefined,
          borderColor: color,
          borderWidth: type === 'line' ? 2.5 : 0,
          borderRadius: type === 'bar' ? 5 : 0,
          pointRadius: type === 'line' ? 4 : 0,
          pointBackgroundColor: color,
          tension: 0.4,
          fill: type === 'line' ? false : undefined,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const v = ctx.raw;
                if (label.includes('₹') || label.toLowerCase().includes('revenue') || label.toLowerCase().includes('avg'))
                  return ' ' + fmtMoney(Math.round(v));
                return ' ' + v;
              }
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
          y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 10 }, callback: v => label.includes('Revenue')||label.includes('revenue') ? '₹'+v.toLocaleString('en-IN') : v }, border: { dash: [3,3] } }
        }
      }
    });
  }

  // ── Change % helper ──
  function changePct(curr, prev) {
    if (!prev) return '<span class="change-nil">—</span>';
    const pct = Math.round((curr - prev) / prev * 100);
    if (pct > 0) return `<span class="change-up">▲ ${pct}%</span>`;
    if (pct < 0) return `<span class="change-down">▼ ${Math.abs(pct)}%</span>`;
    return '<span class="change-nil">—</span>';
  }

  // ── Mini table below chart ──
  function miniTable(metric, values, formatter) {
    return `<table class="comp-table">
      <thead><tr>
        <th>Month</th>
        <th>${metric}</th>
        <th>vs Prev Month</th>
      </tr></thead>
      <tbody>
        ${data.map((d,i) => `<tr>
          <td style="font-weight:600">${d.label}</td>
          <td>${formatter(values[i])}</td>
          <td>${changePct(values[i], i>0?values[i-1]:null)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  // ── Render each tab ──
  // Revenue
  makeChart('chartRevenue', revData, 'Revenue (₹)', '#1a1a2e');
  document.getElementById('compRevTable').innerHTML = miniTable('Revenue', revData, v => fmtMoney(Math.round(v)));

  // Orders
  makeChart('chartOrders', ordData, 'Orders', '#0077b6', 'bar');
  document.getElementById('compOrdTable').innerHTML = miniTable('Orders', ordData, v => v);

  // Fish Qty
  makeChart('chartQty', qtyData, 'Fish Qty Sold', '#06d6a0', 'bar');
  document.getElementById('compQtyTable').innerHTML = miniTable('Fish Qty', qtyData, v => v + ' qty');

  // Customers
  makeChart('chartCusts', custData, 'Unique Customers', '#7c3aed', 'line');
  document.getElementById('compCustTable').innerHTML = miniTable('Customers', custData, v => v);

  // ── Full comparison table ──
  const fullRows = data.map((d, i) => `
    <tr>
      <td style="font-weight:700;white-space:nowrap">${d.label}</td>
      <td>${d.orders.length}</td>
      <td>${fmtMoney(Math.round(d.rev))}</td>
      <td style="font-size:11px">${changePct(d.rev, i>0?data[i-1].rev:null)}</td>
      <td>${d.qty}</td>
      <td style="font-size:11px">${changePct(d.qty, i>0?data[i-1].qty:null)}</td>
      <td>${d.custs}</td>
      <td>${fmtMoney(d.avg)}</td>
      <td>${d.fishCount}</td>
    </tr>`).join('');

  document.getElementById('compFullTable').innerHTML = `
    <table class="comp-table">
      <thead>
        <tr>
          <th>Month</th>
          <th>Orders</th>
          <th>Revenue</th>
          <th>Rev Δ</th>
          <th>Fish Qty</th>
          <th>Qty Δ</th>
          <th>Customers</th>
          <th>Avg Order</th>
          <th>Varieties</th>
        </tr>
      </thead>
      <tbody>${fullRows}</tbody>
      <tfoot>
        <tr>
          <td>TOTAL</td>
          <td>${totalOrds}</td>
          <td>${fmtMoney(totalRev)}</td>
          <td>—</td>
          <td>${totalQty}</td>
          <td>—</td>
          <td>—</td>
          <td>${fmtMoney(avgRev)}</td>
          <td>—</td>
        </tr>
      </tfoot>
    </table>`;

  document.getElementById('compRange').textContent = `${data[0]?.label} – ${data[data.length-1]?.label} · ${months.length} months`;
  document.getElementById('compSection').style.display = 'block';
}

// ── Re-run with updated init ──────────────────────────
init();
setInterval(init, 10 * 60 * 1000);
</script>
